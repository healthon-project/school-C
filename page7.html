<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>튼튼탐험대 — 탐험 출발!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'KyoboHand';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/KyoboHand.woff') format('woff');
      font-weight: normal; font-style: normal;
    }
    :root { --title-font:'KyoboHand',sans-serif; --main-font:'Jua',sans-serif; }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{width:100%;min-height:100%;font-family:var(--main-font);background:#04061A;overflow-x:hidden;}
    .scene{min-height:100vh;position:relative;display:flex;flex-direction:column;align-items:center;}

    #star-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .shoot{position:fixed;width:80px;height:1.5px;background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,0.8));border-radius:2px;left:-90px;z-index:1;pointer-events:none;}
    .sh1{top:4%;animation:sh 7s linear 1s infinite;}
    .sh2{top:12%;animation:sh 9s linear 4s infinite;}
    @keyframes sh{from{transform:translateX(0) rotate(18deg);opacity:1;}to{transform:translateX(120vw) rotate(18deg);opacity:0;}}

    .content{position:relative;z-index:10;width:100%;max-width:430px;padding:0 18px 120px;display:flex;flex-direction:column;align-items:center;}

    /* ── FINAL STEP 헤더 ── */
    .final-header{
      margin-top:4vh;width:100%;text-align:center;
      animation:fadeDown 0.5s ease both;
    }
    @keyframes fadeDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

    .final-badge{
      display:inline-block;
      background:rgba(255,200,60,0.15);
      border:1px solid rgba(255,200,60,0.4);
      color:#FFD700;font-family:var(--main-font);
      font-size:12px;letter-spacing:3px;
      padding:5px 18px;border-radius:100px;
      margin-bottom:12px;
    }
    .final-title{
      font-family:var(--title-font);
      font-size:clamp(22px,5.8vw,28px);
      color:#fff;line-height:1.3;
      text-shadow:0 0 24px rgba(255,200,60,0.3);
    }
    .final-title span{font-size:1.1em;}

    /* ── 카드 공통 ── */
    .btn-wrap{
      margin-top:4vh;width:100%;
      display:flex;flex-direction:column;gap:18px;
      animation:fadeUp 0.5s ease 0.1s both;
    }

    /* ── 건강채널 카드 ── */
    .card-health{
      width:100%;border-radius:26px;
      border:2px solid rgba(220,60,60,0.45);
      background:linear-gradient(135deg,rgba(50,10,10,0.92) 0%,rgba(30,5,5,0.97) 100%);
      box-shadow:0 0 40px rgba(220,60,60,0.15),inset 0 1px 0 rgba(255,255,255,0.06);
      overflow:hidden;position:relative;
      cursor:pointer;transition:transform 0.18s;
      text-decoration:none;display:block;
    }
    .card-health:active{transform:scale(0.97);}

    /* 건강채널 배경 일러스트 */
    .health-illust{
      position:relative;width:100%;height:185px;overflow:hidden;
      background:linear-gradient(160deg,#1A0505 0%,#2A0808 50%,#1E0606 100%);
    }

    /* 영화관 배경 줄 */
    .cinema-row{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:0;}

    /* 붉은 커튼 */
    .curtain-l{position:absolute;left:0;top:0;bottom:0;width:38px;background:linear-gradient(90deg,rgba(140,10,10,0.7),transparent);border-radius:0 40% 40% 0;}
    .curtain-r{position:absolute;right:0;top:0;bottom:0;width:38px;background:linear-gradient(270deg,rgba(140,10,10,0.7),transparent);border-radius:40% 0 0 40%;}

    /* 스크린 빛 */
    .screen-glow{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:200px;height:60px;background:rgba(255,240,200,0.06);border-radius:10px;border:1px solid rgba(255,240,200,0.1);}

    /* 파티클 */
    .rsp{position:absolute;border-radius:50%;animation:rSpk 2.5s ease-in-out infinite;}
    @keyframes rSpk{0%,100%{opacity:0.2;transform:scale(0.7);}50%{opacity:0.8;transform:scale(1.3);}}
    .rs1{width:7px;height:7px;background:#FF6060;top:14px;left:40px;animation-delay:0.1s;}
    .rs2{width:5px;height:5px;background:#FFD060;top:24px;right:50px;animation-delay:0.7s;}
    .rs3{width:6px;height:6px;background:#FF9090;top:10px;right:90px;animation-delay:1.2s;}
    .rs4{width:4px;height:4px;background:#FFB060;bottom:40px;left:70px;animation-delay:0.4s;}

    .health-card-body{padding:14px 20px 18px;display:flex;align-items:center;justify-content:space-between;}
    .health-text .card-tag-red{display:inline-block;background:rgba(220,60,60,0.18);border:1px solid rgba(220,60,60,0.4);color:#FF8080;font-size:11px;padding:3px 10px;border-radius:100px;margin-bottom:6px;}
    .health-title{font-family:var(--title-font);font-size:clamp(18px,5vw,22px);color:#fff;line-height:1.2;}
    .health-sub{font-family:var(--main-font);font-size:12px;color:rgba(255,180,180,0.7);margin-top:4px;line-height:1.6;}
    .red-arrow{font-size:22px;color:rgba(255,100,100,0.6);}

    /* ── 오늘의 체크인 카드 ── */
    .card-checkin{
      width:100%;border-radius:26px;
      border:2px solid rgba(60,120,255,0.45);
      background:linear-gradient(135deg,rgba(5,10,50,0.92) 0%,rgba(5,8,35,0.97) 100%);
      box-shadow:0 0 40px rgba(60,120,255,0.14),inset 0 1px 0 rgba(255,255,255,0.06);
      overflow:hidden;position:relative;
      cursor:pointer;transition:transform 0.18s;
      text-decoration:none;display:block;
    }
    .card-checkin:active{transform:scale(0.97);}

    .checkin-illust{
      position:relative;width:100%;height:185px;overflow:hidden;
      background:linear-gradient(160deg,#050A2A 0%,#080F38 50%,#060C2E 100%);
    }

    /* 파티클 */
    .bsp{position:absolute;border-radius:50%;animation:bSpk 2.3s ease-in-out infinite;}
    @keyframes bSpk{0%,100%{opacity:0.2;transform:scale(0.7);}50%{opacity:0.85;transform:scale(1.4);}}
    .bs1{width:8px;height:8px;background:#60A0FF;top:16px;left:50px;animation-delay:0.2s;}
    .bs2{width:5px;height:5px;background:#90D0FF;top:28px;right:44px;animation-delay:0.9s;}
    .bs3{width:6px;height:6px;background:#A0C0FF;bottom:44px;left:80px;animation-delay:0.5s;}
    .bs4{width:4px;height:4px;background:#C0E0FF;top:12px;right:100px;animation-delay:1.4s;}
    .bs5{width:7px;height:7px;background:#80B0FF;bottom:30px;right:60px;animation-delay:0.3s;}

    .checkin-card-body{padding:14px 20px 18px;display:flex;align-items:center;justify-content:space-between;}
    .checkin-text .card-tag-blue{display:inline-block;background:rgba(60,120,255,0.18);border:1px solid rgba(60,120,255,0.4);color:#90B8FF;font-size:11px;padding:3px 10px;border-radius:100px;margin-bottom:6px;}
    .checkin-title{font-family:var(--title-font);font-size:clamp(18px,5vw,22px);color:#fff;line-height:1.2;}
    .checkin-sub{font-family:var(--main-font);font-size:12px;color:rgba(160,200,255,0.7);margin-top:4px;line-height:1.6;}
    .blue-arrow{font-size:22px;color:rgba(100,160,255,0.6);}

    /* ── 마지막 응원 섹션 ── */
    .cheer-section{
      margin-top:4vh;width:100%;
      display:flex;flex-direction:column;align-items:center;
      animation:fadeUp 0.5s ease 0.25s both;
    }
    .cheer-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);margin-bottom:3vh;}

    .cheer-bubble{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:24px;padding:22px 26px;
      text-align:center;width:100%;
      position:relative;
    }
    .cheer-q{
      font-family:var(--main-font);
      font-size:15px;color:rgba(220,230,255,0.9);
      line-height:2;
    }
    .cheer-q .hl-yellow{
      font-family:var(--title-font);
      font-size:clamp(18px,5vw,22px);
      color:#FFD700;
      text-shadow:0 0 12px rgba(255,200,0,0.4);
      animation:cheerShimmer 2s ease-in-out infinite;
    }
    @keyframes cheerShimmer{0%,100%{text-shadow:0 0 12px rgba(255,200,0,0.4);}50%{text-shadow:0 0 24px rgba(255,200,0,0.8);}}

    /* 점프하는 캐릭터들 */
    .cheer-chars{
      display:flex;align-items:flex-end;justify-content:center;
      gap:16px;margin-top:18px;
    }
    .cheer-char{animation:cheerJump 1.2s ease-in-out infinite;}
    .cheer-char:nth-child(2){animation-delay:0.2s;}
    .cheer-char:nth-child(3){animation-delay:0.4s;}
    @keyframes cheerJump{0%,100%{transform:translateY(0);}45%{transform:translateY(-14px);}55%{transform:translateY(-14px);}}

    /* 색종이 */
    .confetti-wrap{position:relative;width:100%;height:50px;overflow:hidden;margin-top:10px;}
    .conf{position:absolute;border-radius:2px;animation:confFall 3s linear infinite;}
    @keyframes confFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(60px) rotate(360deg);opacity:0;}}

    /* ── 네비 ── */
    .nav-bar{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;justify-content:center;gap:12px;padding:12px 20px 20px;background:linear-gradient(to top,rgba(4,6,26,0.97) 60%,transparent);}
    .nav-btn{flex:1;max-width:160px;display:flex;align-items:center;justify-content:center;gap:5px;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.18);border-radius:100px;padding:11px 0;font-family:var(--main-font);font-size:14px;color:#fff;cursor:pointer;transition:transform 0.15s;}
    .nav-btn:active{transform:scale(0.95);}
    .nav-btn.prev{background:rgba(255,255,255,0.08);}
    .page-out{animation:pageOut 0.4s ease forwards!important;}
    @keyframes pageOut{to{opacity:0;transform:translateY(-14px);}}

    /* 체크인 모달 월 버튼 */
    .ci-month-btn{font-family:var(--main-font);font-size:12px;padding:5px 10px;border-radius:100px;border:1px solid rgba(60,120,255,0.3);background:rgba(60,120,255,0.08);color:rgba(160,200,255,0.7);cursor:pointer;transition:all 0.15s;}
    .ci-month-btn.active{background:rgba(60,120,255,0.35);border-color:rgba(80,150,255,0.6);color:#fff;}
    #checkin-modal.open{display:flex!important;}
  </style>
</head>
<body>
<div class="scene">
  <canvas id="star-canvas"></canvas>
  <div class="shoot sh1"></div>
  <div class="shoot sh2"></div>

  <div class="content">

    <!-- FINAL STEP 헤더 -->
    <div class="final-header">
      <div class="final-badge" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.3);color:#fff;letter-spacing:3px;">Step 5</div>
      <div class="final-title"><span>📺</span> 임무 완료!<br>이제는 즐거운 힐링타임 <span>📺</span></div>
    </div>

    <!-- 버튼 카드 2개 -->
    <div class="btn-wrap">

      <!-- ① 건강채널 -->
      <a class="card-health" id="btn-health" href="https://padlet.com/a01067752602/padlet-9ri47j3wo65y4rc7" target="_blank">
        <div class="health-illust">
          <!-- 커튼 -->
          <div class="curtain-l"></div>
          <div class="curtain-r"></div>
          <!-- 스크린 빛 -->
          <div class="screen-glow"></div>
          <!-- 파티클 -->
          <div class="rsp rs1"></div><div class="rsp rs2"></div>
          <div class="rsp rs3"></div><div class="rsp rs4"></div>

          <!-- 영화관 일러스트: 팝콘 먹으며 관람하는 동물들 -->
          <div class="cinema-row">
            <!-- 왼쪽: 팝콘 먹는 곰 -->
            <svg width="80" height="110" viewBox="0 0 80 112" fill="none">
              <!-- 의자 -->
              <rect x="8" y="80" width="64" height="32" rx="8" fill="#8B1A1A"/>
              <rect x="4" y="72" width="72" height="12" rx="6" fill="#A52020"/>
              <rect x="8" y="100" width="12" height="12" rx="3" fill="#701010"/>
              <rect x="60" y="100" width="12" height="12" rx="3" fill="#701010"/>
              <!-- 몸 -->
              <ellipse cx="40" cy="68" rx="22" ry="18" fill="#C49A28"/>
              <!-- 팔 (팝콘 들기) -->
              <path d="M20 62 Q10 54 12 44" stroke="#C49A28" stroke-width="8" stroke-linecap="round" fill="none"/>
              <!-- 팝콘 통 -->
              <path d="M6 44 L14 60 L22 60 L18 44 Z" fill="#FF3030"/>
              <line x1="6" y1="44" x2="22" y2="44" stroke="white" stroke-width="2"/>
              <line x1="14" y1="44" x2="14" y2="60" stroke="white" stroke-width="1.5"/>
              <!-- 팝콘알 -->
              <circle cx="8" cy="42" r="3" fill="#FFF0A0"/>
              <circle cx="13" cy="39" r="3.5" fill="#FFF8C0"/>
              <circle cx="19" cy="41" r="3" fill="#FFF0A0"/>
              <circle cx="24" cy="40" r="2.5" fill="#FFF8C0"/>
              <!-- 머리 -->
              <circle cx="40" cy="40" r="24" fill="#D4A830"/>
              <!-- 귀 -->
              <circle cx="20" cy="22" r="10" fill="#D4A830"/>
              <circle cx="60" cy="22" r="10" fill="#D4A830"/>
              <circle cx="20" cy="22" r="6" fill="#E8C040"/>
              <circle cx="60" cy="22" r="6" fill="#E8C040"/>
              <!-- 눈 (영화 보며 반짝) -->
              <circle cx="32" cy="38" r="6" fill="white"/>
              <circle cx="48" cy="38" r="6" fill="white"/>
              <circle cx="33" cy="39" r="4" fill="#1A1000"/>
              <circle cx="49" cy="39" r="4" fill="#1A1000"/>
              <circle cx="34" cy="38" r="1.5" fill="white"/>
              <circle cx="50" cy="38" r="1.5" fill="white"/>
              <!-- 입 (아~ 하고 감탄) -->
              <path d="M33 48 Q40 55 47 48" stroke="#8B6010" stroke-width="2" stroke-linecap="round" fill="none"/>
              <!-- 3D 안경 -->
              <rect x="24" y="34" width="14" height="9" rx="4" fill="rgba(255,0,0,0.4)" stroke="#333" stroke-width="1.5"/>
              <rect x="42" y="34" width="14" height="9" rx="4" fill="rgba(0,100,255,0.4)" stroke="#333" stroke-width="1.5"/>
              <line x1="38" y1="38" x2="42" y2="38" stroke="#333" stroke-width="1.5"/>
            </svg>

            <!-- 가운데: 스크린 빛 받는 효과 -->
            <svg width="60" height="110" viewBox="0 0 60 112" fill="none">
              <!-- 빛 줄기 -->
              <path d="M30 0 L10 60 L50 60 Z" fill="rgba(255,240,180,0.04)"/>
              <!-- 음표 -->
              <text x="20" y="35" font-size="16" fill="rgba(255,150,150,0.6)" style="animation:floatN 2s ease-in-out infinite">♪</text>
              <text x="32" y="22" font-size="12" fill="rgba(255,180,100,0.5)" style="animation:floatN 2s ease-in-out 0.5s infinite">✨</text>
            </svg>

            <!-- 오른쪽: 팝콘 먹는 고양이 -->
            <svg width="80" height="110" viewBox="0 0 80 112" fill="none">
              <!-- 의자 -->
              <rect x="8" y="80" width="64" height="32" rx="8" fill="#8B1A1A"/>
              <rect x="4" y="72" width="72" height="12" rx="6" fill="#A52020"/>
              <rect x="8" y="100" width="12" height="12" rx="3" fill="#701010"/>
              <rect x="60" y="100" width="12" height="12" rx="3" fill="#701010"/>
              <!-- 몸 -->
              <ellipse cx="40" cy="68" rx="20" ry="17" fill="#F0B8F0"/>
              <!-- 팔 오른쪽 (팝콘) -->
              <path d="M60 62 Q70 54 68 44" stroke="#F0B8F0" stroke-width="8" stroke-linecap="round" fill="none"/>
              <!-- 팝콘 통 오른쪽 -->
              <path d="M58 44 L66 60 L74 60 L70 44 Z" fill="#FFD700"/>
              <line x1="58" y1="44" x2="74" y2="44" stroke="#FF4444" stroke-width="2"/>
              <line x1="66" y1="44" x2="66" y2="60" stroke="#FF4444" stroke-width="1.5"/>
              <!-- 팝콘알 -->
              <circle cx="57" cy="42" r="2.5" fill="#FFF8C0"/>
              <circle cx="63" cy="39" r="3" fill="#FFF0A0"/>
              <circle cx="69" cy="41" r="2.5" fill="#FFF8C0"/>
              <circle cx="74" cy="40" r="2" fill="#FFF0A0"/>
              <!-- 꼬리 -->
              <path d="M58 72 Q68 66 66 56" stroke="#D890D8" stroke-width="4" stroke-linecap="round" fill="none"/>
              <!-- 머리 -->
              <circle cx="40" cy="40" r="22" fill="#F8C8F0"/>
              <!-- 귀 -->
              <polygon points="16,22 12,6 26,18" fill="#F8C8F0"/>
              <polygon points="64,22 68,6 54,18" fill="#F8C8F0"/>
              <polygon points="17,21 14,9 25,18" fill="#FFB0E0"/>
              <polygon points="63,21 66,9 55,18" fill="#FFB0E0"/>
              <!-- 눈 (반짝반짝) -->
              <circle cx="32" cy="38" r="6" fill="white"/>
              <circle cx="48" cy="38" r="6" fill="white"/>
              <circle cx="33" cy="39" r="4" fill="#8020A0"/>
              <circle cx="49" cy="39" r="4" fill="#8020A0"/>
              <circle cx="34" cy="37" r="1.5" fill="white"/>
              <circle cx="50" cy="37" r="1.5" fill="white"/>
              <!-- 코 -->
              <ellipse cx="40" cy="44" rx="3" ry="2" fill="#E060C0"/>
              <!-- 감탄 입 -->
              <path d="M34 49 Q40 56 46 49" stroke="#C040A0" stroke-width="2" stroke-linecap="round" fill="none"/>
              <!-- 3D 안경 -->
              <rect x="22" y="34" width="14" height="9" rx="4" fill="rgba(255,0,0,0.4)" stroke="#333" stroke-width="1.5"/>
              <rect x="44" y="34" width="14" height="9" rx="4" fill="rgba(0,100,255,0.4)" stroke="#333" stroke-width="1.5"/>
              <line x1="36" y1="38" x2="44" y2="38" stroke="#333" stroke-width="1.5"/>
            </svg>
          </div>
        </div>

        <div class="health-card-body">
          <div class="health-text">
            <div class="health-title">쏙쏙 건강채널</div>
            <div class="health-sub">팝콘처럼 톡톡 터지는<br>재미있는 건강 영상 보기</div>
          </div>
          <span class="red-arrow">›</span>
        </div>
      </a>

      <!-- ② 오늘의 체크인 -->
      <div class="card-checkin" onclick="openCheckin()" style="cursor:pointer;">
        <div class="checkin-illust">
          <!-- 파티클 -->
          <div class="bsp bs1"></div><div class="bsp bs2"></div>
          <div class="bsp bs3"></div><div class="bsp bs4"></div><div class="bsp bs5"></div>

          <!-- 체중계+캐릭터 일러스트 -->
          <div style="position:absolute;bottom:0;left:0;right:0;display:flex;align-items:flex-end;justify-content:center;gap:10px;padding:0 16px;">

            <!-- 왼쪽 빈 공간 / 눈금 그래프 -->
            <svg width="70" height="110" viewBox="0 0 70 112" fill="none" style="flex-shrink:0;">
              <!-- 그래프 막대 -->
              <rect x="10" y="70" width="12" height="40" rx="3" fill="rgba(60,120,255,0.4)"/>
              <rect x="30" y="52" width="12" height="58" rx="3" fill="rgba(60,160,255,0.5)"/>
              <rect x="50" y="60" width="12" height="50" rx="3" fill="rgba(100,200,255,0.45)"/>
              <!-- 기준선 -->
              <line x1="6" y1="110" x2="68" y2="110" stroke="rgba(100,160,255,0.4)" stroke-width="1.5"/>
              <!-- 하트 -->
              <path d="M35 20 C35 20 26 13 26 20 C26 27 35 34 35 34 C35 34 44 27 44 20 C44 13 35 20 35 20Z" fill="rgba(100,200,255,0.6)"/>
            </svg>

            <!-- 가운데: 체중계 위에 올라간 토끼 -->
            <svg width="90" height="112" viewBox="0 0 90 114" fill="none">
              <!-- 체중계 본체 -->

<script>
/* ── 별 ── */
(function(){
  var c=document.getElementById('star-canvas'),ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;draw();}
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(var i=0;i<200;i++){
      var x=Math.random()*c.width,y=Math.random()*c.height;
      var r=Math.random()*1.6+0.2,a=Math.random()*0.8+0.2;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+a+')';ctx.fill();
    }
  }
  window.addEventListener('resize',resize);resize();
})();

/* ── 색종이 ── */
(function(){
  var wrap=document.getElementById('confetti');
  var colors=['#FFD700','#FF6060','#60B0FF','#60E880','#FF90D0','#FFB347'];
  for(var i=0;i<18;i++){
    var el=document.createElement('div');
    el.style.cssText='position:absolute;width:'+(4+Math.random()*6)+'px;height:'+(4+Math.random()*6)+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';border-radius:2px;left:'+Math.random()*100+'%;animation:confFall '+(2+Math.random()*2)+'s linear '+(Math.random()*2)+'s infinite;opacity:0.85;';
    wrap.appendChild(el);
  }
})();

/* ── 링크 저장/복원 ── */
(function(){
  var lH=localStorage.getItem('page7_health')||'';
  if(lH){document.getElementById('link-health').value=lH;document.getElementById('btn-health').href=lH;}
})();
function saveCardLink(key){
  var val=document.getElementById('link-'+key).value.trim();
  localStorage.setItem('page7_'+key,val);
  if(val)document.getElementById('btn-'+key).href=val;
}

/* ── 체크인 모달 ── */
var CI_STORAGE='tuntun_body_records_v2';
var ciMonth=6;

// ★ 배포 후 받은 Apps Script URL을 여기에 붙여넣으세요 ★
var SCRIPT_URL = localStorage.getItem('ci_script_url') || '';

function loadCiRecords(){try{var r=localStorage.getItem(CI_STORAGE);return r?JSON.parse(r):{};} catch(e){return {};}}
function saveCiRecords(r){try{localStorage.setItem(CI_STORAGE,JSON.stringify(r));}catch(e){}}

function getBmiStatus(bmi){
  if(bmi<18.5) return{label:'저체중',color:'#378ADD',bg:'#E6F1FB',desc:'몸무게가 조금 부족해요. 균형 잡힌 식사로 건강하게 몸을 키워봐요!'};
  if(bmi<23)   return{label:'정상',color:'#1D9E75',bg:'#E1F5EE',desc:'아주 건강한 상태예요! 지금처럼 건강한 생활을 유지해요!'};
  if(bmi<25)   return{label:'과체중(비만 전단계)',color:'#EF9F27',bg:'#FAEEDA',desc:'비만 전단계예요. 규칙적인 운동과 균형 잡힌 식사를 시작해봐요!'};
  if(bmi<30)   return{label:'1단계 비만',color:'#D85A30',bg:'#FAECE7',desc:'1단계 비만이에요. 건강한 식습관과 운동이 꼭 필요해요!'};
  if(bmi<35)   return{label:'2단계 비만',color:'#E24B4A',bg:'#FCEBEB',desc:'2단계 비만이에요. 선생님과 함께 건강 계획을 세워봐요!'};
  return          {label:'3단계 비만(고도비만)',color:'#A32D2D',bg:'#FCEBEB',desc:'고도비만이에요. 전문가의 도움이 필요해요. 선생님께 말씀드려요!'};
}

function saveScriptUrl(){
  var val=document.getElementById('ci-script-url').value.trim();
  localStorage.setItem('ci_script_url',val);
  SCRIPT_URL=val;
}

function openCheckin(){
  document.getElementById('checkin-modal').classList.add('open');
  var savedUrl=localStorage.getItem('ci_script_url')||'';
  if(savedUrl) document.getElementById('ci-script-url').value=savedUrl;
  ciMonth=new Date().getMonth()+1;
  if(ciMonth<6) ciMonth=6; if(ciMonth>12) ciMonth=12;
  document.querySelectorAll('.ci-month-btn').forEach(function(b){
    b.classList.toggle('active',b.textContent===ciMonth+'월');
  });
  var recs=loadCiRecords();
  if(recs[ciMonth]){
    document.getElementById('ci-height').value=recs[ciMonth].h;
    document.getElementById('ci-weight').value=recs[ciMonth].w;
    ciShowResult(recs[ciMonth].bmi);
  } else {
    document.getElementById('ci-height').value='';
    document.getElementById('ci-weight').value='';
    document.getElementById('ci-result').style.display='none';
  }
  ciRenderHistory(recs);
}
function closeCheckin(){document.getElementById('checkin-modal').classList.remove('open');}

function ciSelectMonth(m,el){
  ciMonth=m;
  document.querySelectorAll('.ci-month-btn').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  var recs=loadCiRecords();
  if(recs[m]){
    document.getElementById('ci-height').value=recs[m].h;
    document.getElementById('ci-weight').value=recs[m].w;
    ciShowResult(recs[m].bmi);
  } else {
    document.getElementById('ci-height').value='';
    document.getElementById('ci-weight').value='';
    document.getElementById('ci-result').style.display='none';
  }
}

function ciShowResult(bmi){
  var st=getBmiStatus(bmi);
  var rc=document.getElementById('ci-result');
  rc.style.display='block'; rc.style.background=st.bg;
  document.getElementById('ci-bmi-val').textContent='BMI '+bmi.toFixed(1);
  document.getElementById('ci-bmi-val').style.color=st.color;
  document.getElementById('ci-bmi-label').textContent=st.label;
  document.getElementById('ci-bmi-label').style.color=st.color;
  document.getElementById('ci-bmi-desc').textContent=st.desc;
}

function ciCalcBMI(){
  var h=parseFloat(document.getElementById('ci-height').value);
  var w=parseFloat(document.getElementById('ci-weight').value);
  var num=document.getElementById('ci-number').value.trim();
  var name=document.getElementById('ci-name').value.trim();
  if(!h||!w||h<80||h>220||w<10||w>200){ciToast('키와 몸무게를 올바르게 입력해 주세요!');return;}
  var bmi=w/((h/100)*(h/100));
  // 로컬 저장
  var recs=loadCiRecords();
  recs[ciMonth]={h:h,w:w,bmi:bmi,number:num,name:name};
  saveCiRecords(recs);
  ciShowResult(bmi);
  ciRenderHistory(recs);
  // 구글 시트 전송
  var url=SCRIPT_URL||localStorage.getItem('ci_script_url')||'';
  if(url){
    ciToast('📡 저장 중...');
    fetch(url,{
      method:'POST',
      body:JSON.stringify({number:num,name:name,month:ciMonth,height:h,weight:w,bmi:bmi}),
      headers:{'Content-Type':'application/json'}
    })
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.result==='ok') ciToast('✅ '+ciMonth+'월 기록이 구글 시트에 저장됐어요!');
      else ciToast('⚠️ 저장 실패: '+d.message);
    })
    .catch(function(){ciToast('✅ 기록은 내 기기에 저장됐어요!');});
  } else {
    ciToast(ciMonth+'월 기록 저장 완료! 🔒');
  }
}

function ciRenderHistory(recs){
  var keys=Object.keys(recs).map(Number).sort(function(a,b){return a-b;});
  var wrap=document.getElementById('ci-history');
  if(keys.length===0){wrap.style.display='none';return;}
  wrap.style.display='block';
  var html='';
  keys.forEach(function(m,idx){
    var r=recs[m],st=getBmiStatus(r.bmi),trend='';
    if(idx>0){var d=r.bmi-recs[keys[idx-1]].bmi;trend=d>0.2?'<span style="color:#E24B4A">↑</span>':d<-0.2?'<span style="color:#1D9E75">↓</span>':'<span style="color:#aaa">→</span>';}
    html+='<div style="display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.05);border-radius:10px;padding:8px 12px;gap:6px;">'+
      '<span style="font-family:var(--main-font);font-size:12px;color:rgba(200,220,255,0.7);min-width:30px;">'+m+'월</span>'+
      '<span style="font-family:var(--main-font);font-size:11px;color:rgba(180,200,255,0.6);flex:1;">'+r.h+'cm·'+r.w+'kg</span>'+
      '<span style="font-family:var(--main-font);font-size:13px;font-weight:bold;color:'+st.color+'">'+r.bmi.toFixed(1)+trend+'</span>'+
      '<span style="font-family:var(--main-font);font-size:10px;padding:2px 8px;border-radius:100px;background:'+st.bg+';color:'+st.color+'">'+st.label+'</span>'+
    '</div>';
  });
  document.getElementById('ci-history-list').innerHTML=html;
}

function ciToast(msg){
  var t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(20,30,70,0.96);border:1px solid rgba(100,140,255,0.4);border-radius:100px;padding:10px 22px;font-family:var(--main-font);font-size:14px;color:#C8D8FF;z-index:300;display:none;white-space:nowrap;';document.body.appendChild(t);}
  t.textContent=msg;t.style.display='block';
  setTimeout(function(){t.style.display='none';},2200);
}

/* ── 네비 ── */
function goPrev(){document.querySelector('.scene').classList.add('page-out');setTimeout(function(){window.location.href='page6.html';},400);}

var lt=0;
document.addEventListener('touchend',function(e){var n=Date.now();if(n-lt<300)e.preventDefault();lt=n;},{passive:false});
</script>
