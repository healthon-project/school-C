<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>튼튼탐험대 — 선생님 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyA8DcrxX0l_94zkBTs-TtDSVoY5slUNbNk",
  authDomain: "healthon-project02.firebaseapp.com",
  projectId: "healthon-project02",
  storageBucket: "healthon-project02.firebasestorage.app",
  messagingSenderId: "188732634434",
  appId: "1:188732634434:web:bd0aab6f7e10f5b912c4db",
  measurementId: "G-Y0XPXJTFXM"
});
var db      = firebase.firestore();
var storage = firebase.storage();
</script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--green:#1D9E75;--green2:#5DCAA5;--amber:#EF9F27;--red:#E24B4A;--jua:'Jua',sans-serif;}
html,body{font-family:var(--jua);background:#04061A;color:#fff;min-height:100%;overflow-x:hidden;}

/* ── 헤더 ── */
.header{background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.08);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.header-title{font-size:18px;color:#fff;}
.header-badge{font-size:11px;background:rgba(226,75,74,.2);border:1px solid rgba(226,75,74,.4);color:#FF9A99;padding:3px 10px;border-radius:100px;}

/* ── 날짜 탭 ── */
.date-bar{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:rgba(0,0,0,.2);}
.date-bar::-webkit-scrollbar{display:none;}
.date-tab{flex-shrink:0;padding:6px 14px;border-radius:100px;font-family:var(--jua);font-size:13px;cursor:pointer;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);transition:.15s;}
.date-tab.active{background:rgba(239,159,39,.25);border-color:rgba(239,159,39,.6);color:#FFD86E;}

/* ── 통계 바 ── */
.stats-bar{padding:10px 16px;display:flex;gap:10px;}
.stat-chip{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px;text-align:center;}
.stat-num{font-size:22px;font-weight:700;color:#FFD86E;}
.stat-label{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;font-family:'Nanum Gothic',sans-serif;}

/* ── 액션 버튼 ── */
.action-bar{padding:0 16px 12px;display:flex;gap:8px;}
.action-btn{flex:1;padding:10px;border-radius:12px;font-family:var(--jua);font-size:13px;cursor:pointer;transition:.15s;border:none;}
.action-btn:active{transform:scale(.97);}
.btn-delete-all{background:rgba(226,75,74,.2);border:1px solid rgba(226,75,74,.4);color:#FF9A99;}
.btn-refresh{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);}

/* ── 사진 그리드 ── */
.photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px 100px;}
.photo-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;overflow:hidden;position:relative;}
.photo-card.approved{border-color:rgba(93,202,165,.4);background:rgba(29,158,117,.1);}
.photo-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:rgba(255,255,255,.05);cursor:pointer;}
.photo-info{padding:8px 10px;}
.photo-name{font-size:13px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.photo-sid{font-size:11px;color:#FFD86E;margin-top:1px;}
.photo-time{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;font-family:'Nanum Gothic',sans-serif;}
.photo-actions{display:flex;gap:6px;padding:0 10px 10px;}
.pa-btn{flex:1;padding:7px 0;border-radius:8px;font-family:var(--jua);font-size:12px;cursor:pointer;border:none;transition:.15s;}
.pa-btn:active{transform:scale(.95);}
.btn-approve{background:rgba(29,158,117,.3);border:1px solid rgba(93,202,165,.4);color:#5DCAA5;}
.btn-approve.done{background:rgba(29,158,117,.15);border-color:rgba(93,202,165,.2);color:rgba(93,202,165,.5);pointer-events:none;}
.btn-del{background:rgba(226,75,74,.2);border:1px solid rgba(226,75,74,.35);color:#FF9A99;}
.approved-badge{position:absolute;top:8px;right:8px;background:rgba(29,158,117,.85);border-radius:100px;padding:2px 8px;font-size:11px;color:#fff;}

/* ── 빈 상태 ── */
.empty-state{text-align:center;padding:60px 20px;color:rgba(255,255,255,.4);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:14px;font-family:'Nanum Gothic',sans-serif;}

/* ── 로딩 ── */
.loading{text-align:center;padding:40px;color:rgba(255,255,255,.5);font-family:'Nanum Gothic',sans-serif;}

/* ── 이미지 확대 모달 ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-img{max-width:90vw;max-height:85vh;border-radius:12px;object-fit:contain;}
.modal-close{position:absolute;top:16px;right:16px;font-size:28px;cursor:pointer;color:rgba(255,255,255,.7);}

/* ── 비밀번호 화면 ── */
.lock-screen{position:fixed;inset:0;background:#04061A;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.lock-icon{font-size:56px;}
.lock-title{font-size:20px;}
.lock-input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:12px 16px;font-family:var(--jua);font-size:18px;color:#fff;outline:none;text-align:center;width:200px;letter-spacing:4px;}
.lock-btn{padding:12px 28px;background:rgba(29,158,117,.3);border:1px solid rgba(93,202,165,.4);border-radius:12px;font-family:var(--jua);font-size:15px;color:#5DCAA5;cursor:pointer;}
.lock-err{font-size:13px;color:#FF9A99;display:none;font-family:'Nanum Gothic',sans-serif;}

/* 토스트 */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1D9E75;color:#fff;font-size:13px;padding:8px 18px;border-radius:100px;z-index:300;display:none;white-space:nowrap;}
</style>
</head>
<body>

<!-- 비밀번호 잠금 -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-icon">🔐</div>
  <div class="lock-title">선생님 전용 페이지</div>
  <input class="lock-input" id="lock-input" type="password" placeholder="비밀번호" inputmode="numeric" maxlength="6" onkeydown="if(event.key==='Enter')checkPw()">
  <button class="lock-btn" onclick="checkPw()">확인</button>
  <div class="lock-err" id="lock-err">비밀번호가 틀렸어요</div>
</div>

<!-- 이미지 확대 모달 -->
<div class="modal-overlay" id="modal" onclick="closeModal()">
  <span class="modal-close">✕</span>
  <img class="modal-img" id="modal-img" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<!-- 헤더 -->
<div class="header">
  <div class="header-title">🏃 운동인증 관리</div>
  <div class="header-badge" id="header-date"></div>
</div>

<!-- 날짜 탭 -->
<div class="date-bar" id="date-bar"></div>

<!-- 통계 -->
<div class="stats-bar">
  <div class="stat-chip"><div class="stat-num" id="stat-total">-</div><div class="stat-label">전체 인증</div></div>
  <div class="stat-chip"><div class="stat-num" id="stat-approved">-</div><div class="stat-label">승인완료</div></div>
  <div class="stat-chip"><div class="stat-num" id="stat-pending">-</div><div class="stat-label">미확인</div></div>
</div>

<!-- 액션 -->
<div class="action-bar">
  <button class="action-btn btn-refresh" onclick="loadPhotos()">🔄 새로고침</button>
  <button class="action-btn btn-delete-all" onclick="deleteAllConfirm()">🗑️ 오늘 전체 삭제</button>
</div>

<!-- 사진 그리드 -->
<div class="photo-grid" id="photo-grid">
  <div class="loading">불러오는 중...</div>
</div>

<script>
// ── 비밀번호 (간단히 6자리) ──────────────────────
var ADMIN_PW = '111111'; // ★ 원하는 비밀번호로 변경하세요

function checkPw() {
  var v = document.getElementById('lock-input').value;
  if (v === ADMIN_PW) {
    document.getElementById('lock-screen').style.display = 'none';
    init();
  } else {
    document.getElementById('lock-err').style.display = 'block';
    document.getElementById('lock-input').value = '';
  }
}

// ── 날짜 유틸 ────────────────────────────────────
function getTodayStr() {
  var d = new Date();
  var mm = d.getMonth()+1; var dd = d.getDate();
  return d.getFullYear()+'-'+(mm<10?'0':'')+mm+'-'+(dd<10?'0':'')+dd;
}
function getPastDates(n) {
  var arr = [];
  for (var i = 0; i < n; i++) {
    var d = new Date(); d.setDate(d.getDate()-i);
    var mm = d.getMonth()+1; var dd = d.getDate();
    arr.push(d.getFullYear()+'-'+(mm<10?'0':'')+mm+'-'+(dd<10?'0':'')+dd);
  }
  return arr;
}

var currentDate = getTodayStr();
var photosCache = {}; // date -> [{name, url, sid, sname, time, approved}]

// ── 초기화 ───────────────────────────────────────
function init() {
  var dates = getPastDates(7);
  document.getElementById('header-date').textContent = currentDate;

  // 날짜 탭 생성
  var bar = document.getElementById('date-bar');
  bar.innerHTML = '';
  dates.forEach(function(d, i) {
    var tab = document.createElement('div');
    tab.className = 'date-tab' + (i===0?' active':'');
    tab.textContent = i===0 ? '오늘 ('+d.slice(5)+')' : d.slice(5);
    tab.onclick = (function(date, el){
      return function(){
        document.querySelectorAll('.date-tab').forEach(function(t){t.classList.remove('active');});
        el.classList.add('active');
        currentDate = date;
        document.getElementById('header-date').textContent = date;
        loadPhotos();
      };
    })(d, tab);
    bar.appendChild(tab);
  });

  loadPhotos();
}

// ── 사진 목록 불러오기 ───────────────────────────
function loadPhotos() {
  var grid = document.getElementById('photo-grid');
  grid.innerHTML = '<div class="loading">불러오는 중... 📸</div>';

  var folderRef = storage.ref('exercise/' + currentDate);
  folderRef.listAll().then(function(res) {
    if (res.items.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">'+currentDate+' 인증 사진이 없어요</div></div>';
      updateStats(0, 0);
      return;
    }

    var items = res.items;
    var loaded = 0;
    var photos = [];

    items.forEach(function(itemRef) {
      itemRef.getDownloadURL().then(function(url) {
        // 파일명 파싱: 학번_이름_날짜_시각.jpg
        var name = itemRef.name;
        var parts = name.replace(/\.jpg$/i,'').split('_');
        var sid   = parts[0] || '';
        var sname = parts[1] || '';
        var time  = parts[3] ? parts[3].slice(0,2)+':'+parts[3].slice(2,4) : '';

        photos.push({ name: name, url: url, sid: sid, sname: sname, time: time, ref: itemRef });
        loaded++;
        if (loaded === items.length) {
          // 시간순 정렬
          photos.sort(function(a,b){ return a.name < b.name ? -1 : 1; });
          photosCache[currentDate] = photos;
          renderPhotos(photos);
        }
      }).catch(function() { loaded++; if (loaded===items.length) renderPhotos(photos); });
    });
  }).catch(function(e) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">불러오기 실패<br>'+e.message+'</div></div>';
  });
}

// ── 사진 렌더 ────────────────────────────────────
function renderPhotos(photos) {
  var grid = document.getElementById('photo-grid');
  grid.innerHTML = '';

  var approved = 0;
  photos.forEach(function(p, i) {
    if (p.approved) approved++;
    var card = document.createElement('div');
    card.className = 'photo-card' + (p.approved?' approved':'');
    card.id = 'card-'+i;
    card.innerHTML =
      (p.approved?'<div class="approved-badge">✅ 승인</div>':'')+
      '<img class="photo-img" src="'+p.url+'" loading="lazy" onclick="openModal(\''+p.url+'\')" alt="인증사진">'+
      '<div class="photo-info">'+
        '<div class="photo-name">'+(p.sname||'이름없음')+'</div>'+
        '<div class="photo-sid">학번: '+(p.sid||'-')+'</div>'+
        '<div class="photo-time">'+(p.time?p.time+' 업로드':'-')+'</div>'+
      '</div>'+
      '<div class="photo-actions">'+
        '<button class="pa-btn btn-approve'+(p.approved?' done':'')+'" onclick="approvePhoto('+i+')" id="apv-'+i+'">'+(p.approved?'승인됨':'✅ 승인')+'</button>'+
        '<button class="pa-btn btn-del" onclick="deletePhoto('+i+')">🗑️ 삭제</button>'+
      '</div>';
    grid.appendChild(card);
  });

  updateStats(photos.length, approved);
}

function updateStats(total, approved) {
  document.getElementById('stat-total').textContent    = total;
  document.getElementById('stat-approved').textContent = approved;
  document.getElementById('stat-pending').textContent  = total - approved;
}

// ── 승인 ─────────────────────────────────────────
function approvePhoto(i) {
  var photos = photosCache[currentDate];
  if (!photos || !photos[i]) return;
  photos[i].approved = true;

  var card = document.getElementById('card-'+i);
  card.classList.add('approved');
  card.querySelector('.approved-badge') || (card.insertAdjacentHTML('afterbegin','<div class="approved-badge">✅ 승인</div>'));
  var apvBtn = document.getElementById('apv-'+i);
  apvBtn.textContent = '승인됨'; apvBtn.classList.add('done');

  // Firestore에 승인 기록 (학번 기준)
  var sid = photos[i].sid;
  if (sid && sid !== 'guest') {
    db.collection('students').doc(sid).set({ photoApproved: { date: currentDate, approved: true } }, { merge: true });
  }

  // 통계 업데이트
  var approved = photos.filter(function(p){return p.approved;}).length;
  updateStats(photos.length, approved);
  showToast('✅ 승인 완료!');
}

// ── 개별 삭제 ────────────────────────────────────
function deletePhoto(i) {
  var photos = photosCache[currentDate];
  if (!photos || !photos[i]) return;
  if (!confirm('"'+(photos[i].sname||photos[i].sid)+'" 인증 사진을 삭제할까요?')) return;

  photos[i].ref.delete().then(function() {
    photos.splice(i, 1);
    renderPhotos(photos);
    showToast('🗑️ 삭제 완료');
  }).catch(function(e){ showToast('삭제 실패: '+e.message); });
}

// ── 전체 삭제 ────────────────────────────────────
function deleteAllConfirm() {
  var photos = photosCache[currentDate];
  if (!photos || photos.length === 0) { showToast('삭제할 사진이 없어요'); return; }
  if (!confirm(currentDate + ' 인증 사진 ' + photos.length + '장을 모두 삭제할까요?')) return;

  var done = 0;
  photos.forEach(function(p) {
    p.ref.delete().then(function() {
      done++;
      if (done === photos.length) {
        photosCache[currentDate] = [];
        renderPhotos([]);
        showToast('🗑️ 전체 삭제 완료!');
      }
    }).catch(function(){ done++; });
  });
}

// ── 모달 ─────────────────────────────────────────
function openModal(url) {
  document.getElementById('modal-img').src = url;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// ── 토스트 ───────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(function(){ t.style.display='none'; }, 2200);
}
</script>
</body>
</html>
