<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>튼튼탐험대</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'KH';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/KyoboHand.woff') format('woff');}
:root{--jua:'Jua',sans-serif;--hand:'KH',sans-serif;--green:#1D9E75;--green2:#5DCAA5;--amber:#EF9F27;--blue:#378ADD;--coral:#D85A30;--purple:#7F77DD;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{font-family:var(--jua);background:#04061A;color:#fff;overflow-x:hidden;height:100%;}
.scene{width:100%;min-height:100dvh;position:relative;display:flex;flex-direction:column;align-items:center;background:radial-gradient(ellipse at 20% 30%,rgba(127,119,221,.07),transparent 55%),radial-gradient(ellipse at 80% 70%,rgba(55,138,221,.06),transparent 50%),linear-gradient(170deg,#04061A,#0B0E2A 55%,#0E1535);}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.6),transparent),radial-gradient(1px 1px at 28% 8%,rgba(255,255,255,.5),transparent),radial-gradient(1.5px 1.5px at 45% 22%,rgba(255,255,255,.65),transparent),radial-gradient(1px 1px at 62% 6%,rgba(255,255,255,.75),transparent),radial-gradient(1px 1px at 78% 16%,rgba(255,255,255,.4),transparent),radial-gradient(1.5px 1.5px at 93% 11%,rgba(255,255,255,.6),transparent),radial-gradient(1px 1px at 5% 38%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 52% 42%,rgba(255,255,255,.3),transparent),radial-gradient(1px 1px at 87% 36%,rgba(255,255,255,.7),transparent),radial-gradient(1px 1px at 16% 57%,rgba(255,255,255,.4),transparent),radial-gradient(1px 1px at 72% 54%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 37% 69%,rgba(255,255,255,.3),transparent),radial-gradient(1.5px 1.5px at 57% 76%,rgba(255,255,255,.55),transparent),radial-gradient(1px 1px at 82% 72%,rgba(255,255,255,.4),transparent),radial-gradient(1px 1px at 9% 82%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 47% 89%,rgba(255,255,255,.3),transparent),radial-gradient(1px 1px at 94% 84%,rgba(255,255,255,.6),transparent),radial-gradient(1px 1px at 32% 94%,rgba(255,255,255,.4),transparent),radial-gradient(1.5px 1.5px at 67% 97%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 20% 4%,rgba(255,255,255,.6),transparent),radial-gradient(1px 1px at 42% 30%,rgba(255,255,255,.35),transparent),radial-gradient(1px 1px at 75% 48%,rgba(255,255,255,.45),transparent),radial-gradient(1px 1px at 15% 62%,rgba(255,255,255,.4),transparent),radial-gradient(1px 1px at 88% 26%,rgba(255,255,255,.55),transparent);}

/* ── 레벨 배너 ── */
.level-banner{position:relative;z-index:10;width:100%;max-width:430px;margin-top:12px;padding:0 14px;animation:fadeDown .5s ease both;}
.lv-strip{background:rgba(255,255,255,.06);border:1px solid rgba(200,220,255,.15);border-radius:16px;padding:10px 14px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.lv-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border-radius:10px;transition:background .2s;}
.lv-item.active{background:rgba(255,255,255,.1);}
.lv-emoji{font-size:22px;line-height:1;}
.lv-item.active .lv-emoji{font-size:28px;}
.lv-name{font-size:9px;color:rgba(200,220,255,.55);text-align:center;line-height:1.3;}
.lv-item.active .lv-name{color:rgba(255,255,255,.85);}
.lv-pts{font-size:8px;color:rgba(200,220,255,.35);text-align:center;}
.lv-item.active .lv-pts{color:#FFD86E;}
.lv-bar-wrap{display:flex;align-items:center;gap:6px;margin-top:8px;padding:0 2px;}
.lv-bar-track{flex:1;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.lv-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--green2));transition:width .4s ease;}
.lv-bar-label{font-size:11px;color:#FFD86E;white-space:nowrap;}
/* ── 포인트 직접 입력 ── */
.lv-pts-input-wrap{margin-top:8px;display:flex;align-items:center;gap:8px;padding:0 2px;}
.lv-pts-input-label{font-size:11px;color:rgba(200,220,255,.55);white-space:nowrap;flex-shrink:0;}
.lv-pts-input{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,216,110,.3);border-radius:10px;padding:7px 10px;font-family:var(--jua);font-size:15px;color:#FFD86E;outline:none;text-align:center;min-width:0;}
.lv-pts-input:focus{border-color:rgba(255,216,110,.65);background:rgba(255,255,255,.14);}
.lv-pts-input::placeholder{color:rgba(255,216,110,.3);font-size:13px;}
.lv-pts-save-btn{padding:7px 14px;background:rgba(255,216,110,.15);border:1px solid rgba(255,216,110,.35);border-radius:10px;font-family:var(--jua);font-size:13px;color:#FFD86E;cursor:pointer;white-space:nowrap;transition:.15s;flex-shrink:0;}
.lv-pts-save-btn:active{transform:scale(.95);background:rgba(255,216,110,.25);}

/* ── 메인 레이아웃 ── */
.layout{position:relative;z-index:10;width:100%;max-width:430px;padding:0 16px 100px;flex:1;}
.planet-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px;}
.planet-btn{border:none;cursor:pointer;border-radius:24px;padding:20px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:transform .15s,box-shadow .15s;text-decoration:none;}
.planet-btn:active{transform:scale(.95);}
.pb-mission{background:linear-gradient(145deg,#1A4A3A,#0D2E25);border:2px solid rgba(93,202,165,.35);box-shadow:0 4px 20px rgba(29,158,117,.2);}
.pb-apply  {background:linear-gradient(145deg,#2A1F5A,#1A123A);border:2px solid rgba(127,119,221,.35);box-shadow:0 4px 20px rgba(127,119,221,.15);}
.pb-play   {background:linear-gradient(145deg,#1A3A10,#0E2208);border:2px solid rgba(100,200,80,.3);box-shadow:0 4px 20px rgba(100,200,80,.12);}
.pb-bmi    {background:linear-gradient(145deg,#0E2A4A,#081A2E);border:2px solid rgba(55,138,221,.3);box-shadow:0 4px 20px rgba(55,138,221,.12);}
.pb-icon{font-size:36px;line-height:1;}
.pb-label{font-family:var(--jua);font-size:15px;color:#fff;font-weight:700;}
.pb-sub{font-size:11px;color:rgba(200,220,255,.6);text-align:center;line-height:1.4;}

/* ── 네비 ── */
.nav-row{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;justify-content:center;gap:12px;padding:12px 20px 24px;background:linear-gradient(to top,rgba(4,6,26,.95) 60%,transparent);}
.nav-btn{flex:1;max-width:160px;display:flex;align-items:center;justify-content:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:100px;padding:11px 0;font-family:var(--jua);font-size:14px;color:#fff;cursor:pointer;transition:transform .15s;}
.nav-btn:active{transform:scale(.95);}
.nav-btn.next{background:rgba(29,158,117,.35);border-color:rgba(93,202,165,.4);}

/* ── 관리자 모달 ── */
.admin-modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;}
.admin-modal-wrap.open{display:flex;}
.admin-modal-box{background:#fff;border-radius:20px;padding:26px 22px 20px;width:280px;text-align:center;}
.admin-modal-icon{font-size:32px;margin-bottom:6px;}
.admin-modal-title{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:3px;font-family:var(--jua);}
.admin-modal-sub{font-size:12px;color:#888;margin-bottom:12px;}
.admin-modal-input{width:100%;padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:16px;text-align:center;color:#1a1a1a;margin-bottom:4px;outline:none;}
.admin-modal-input:focus{border-color:#1D9E75;}
.admin-modal-err{font-size:12px;color:#E24B4A;min-height:16px;margin-bottom:8px;}
.admin-modal-btns{display:flex;gap:8px;}
.admin-modal-cancel{flex:1;padding:10px;border:1.5px solid #e0e0e0;border-radius:10px;background:#f5f5f5;color:#666;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--jua);}
.admin-modal-confirm{flex:1;padding:10px;border:none;border-radius:10px;background:#1D9E75;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--jua);}

/* ── 대시보드 ── */
.dash-panel{position:fixed;inset:0;z-index:500;background:rgba(4,6,26,.97);overflow-y:auto;display:none;flex-direction:column;}
.dash-panel.open{display:flex;}
.dash-inner{padding:20px 18px 100px;max-width:480px;margin:0 auto;width:100%;}
.dash-title{font-family:var(--hand);font-size:20px;color:#fff;margin-bottom:14px;display:flex;align-items:center;}
.dash-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.dash-tab{padding:7px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:100px;font-size:12px;font-family:var(--jua);color:rgba(200,220,255,.7);cursor:pointer;transition:.15s;}
.dash-tab.active{background:rgba(29,158,117,.3);border-color:rgba(93,202,165,.4);color:#fff;}
.dash-tab-panel{display:none;}
.dash-tab-panel.active{display:block;}
.dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.dash-stat{background:rgba(255,255,255,.06);border-radius:14px;padding:12px 8px;text-align:center;}
.ds-num{font-size:22px;font-weight:700;color:#fff;}
.ds-label{font-size:10px;color:rgba(200,220,255,.55);margin-top:3px;}
.dash-sec-title{font-size:12px;color:rgba(200,220,255,.55);margin:14px 0 6px;font-family:var(--jua);}
.lv-dist-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.lv-dist-label{font-size:12px;color:rgba(200,220,255,.7);width:70px;flex-shrink:0;}
.lv-dist-bar-wrap{flex:1;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
.lv-dist-bar{height:100%;border-radius:4px;transition:width .4s;}
.lv-dist-count{font-size:11px;color:#FFD86E;width:32px;text-align:right;}
.dash-input{width:100%;padding:10px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;font-size:14px;color:#fff;margin-bottom:8px;outline:none;font-family:var(--jua);}
.dash-input::placeholder{color:rgba(200,220,255,.35);}
.dash-input:focus{border-color:rgba(93,202,165,.5);}
.dash-grant-row{display:flex;gap:6px;}
.dash-grant-btn{padding:10px 14px;background:linear-gradient(135deg,#1D9E75,#0F6E56);color:#fff;border:none;border-radius:10px;font-size:13px;font-family:var(--jua);cursor:pointer;white-space:nowrap;}
.grant-log{max-height:140px;overflow-y:auto;font-size:11px;color:rgba(200,220,255,.6);font-family:var(--jua);}
.grant-log-item{padding:4px 0;border-bottom:1px solid rgba(255,255,255,.06);}
.dash-print-btn{width:100%;padding:11px;background:#E24B4A;color:#fff;border:none;border-radius:12px;font-size:13px;font-family:var(--jua);cursor:pointer;margin-top:8px;}
.sheets-btn{width:100%;padding:11px;background:rgba(29,158,117,.2);color:#5DCAA5;border:1px solid rgba(93,202,165,.3);border-radius:12px;font-size:13px;font-family:var(--jua);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px;}
.sheets-status{font-size:11px;color:rgba(200,220,255,.5);margin-top:4px;min-height:14px;}
.bmi-table{width:100%;border-collapse:collapse;font-size:12px;}
.bmi-table th{color:rgba(200,220,255,.55);padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.1);font-weight:400;}
.bmi-table td{padding:6px 4px;color:rgba(255,255,255,.8);border-bottom:1px solid rgba(255,255,255,.05);}
.dash-memo{width:100%;min-height:120px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px;font-family:var(--jua);font-size:13px;color:#fff;resize:none;outline:none;}
.memo-save-btn{padding:8px 20px;background:rgba(29,158,117,.3);color:#5DCAA5;border:1px solid rgba(93,202,165,.35);border-radius:10px;font-size:13px;font-family:var(--jua);cursor:pointer;}
.memo-saved-msg{font-size:12px;color:#5DCAA5;}
.dash-notice{background:rgba(255,216,110,.08);border:1px solid rgba(255,216,110,.2);border-radius:10px;padding:8px 12px;font-size:11px;color:rgba(255,220,150,.8);margin-bottom:10px;}
.dash-close-btn{width:100%;padding:12px;background:rgba(255,255,255,.08);color:rgba(200,220,255,.7);border:1px solid rgba(255,255,255,.15);border-radius:14px;font-size:14px;font-family:var(--jua);cursor:pointer;margin-top:16px;}
.checklist-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.05);border-radius:10px;cursor:pointer;font-size:13px;color:rgba(200,220,255,.8);}
.checklist-item input{accent-color:#1D9E75;width:16px;height:16px;}

@keyframes fadeDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.page-out{animation:pageOut .4s ease forwards!important;}
@keyframes pageOut{to{opacity:0;transform:translateY(-12px);}}
</style>
</head>
<body>
<div class="scene">
<div class="stars"></div>

<!-- 관리자 모달 -->
<div class="admin-modal-wrap" id="admin-modal">
  <div class="admin-modal-box">
    <div class="admin-modal-icon">🔐</div>
    <div class="admin-modal-title">교사 대시보드</div>
    <div class="admin-modal-sub">비밀번호를 입력해 주세요</div>
    <input class="admin-modal-input" id="admin-pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkAdmin()">
    <div class="admin-modal-err" id="admin-err"></div>
    <div class="admin-modal-btns">
      <button class="admin-modal-cancel" onclick="closeAdminLogin()">취소</button>
      <button class="admin-modal-confirm" onclick="checkAdmin()">확인</button>
    </div>
  </div>
</div>

<!-- 대시보드 패널 -->
<div class="dash-panel" id="dash-panel">
  <div class="dash-inner">
    <div class="dash-title">🛸 교사 대시보드 <span id="dash-datetime" style="margin-left:auto;font-size:11px;color:rgba(180,195,235,.5);font-family:var(--jua);font-weight:400;"></span></div>
    <div class="dash-tabs">
      <button class="dash-tab active" onclick="switchTab('tab-stats',this)">📈 현황</button>
      <button class="dash-tab" onclick="switchTab('tab-bmi',this)">⚖️ BMI</button>
      <button class="dash-tab" onclick="switchTab('tab-grant',this)">🎁 지급</button>
      <button class="dash-tab" onclick="switchTab('tab-memo',this)">📝 메모</button>
      <button class="dash-tab" onclick="switchTab('tab-settings',this)">⚙️ 설정</button>
    </div>
    <div class="dash-tab-panel active" id="tab-stats">
      <div class="dash-stats">
        <div class="dash-stat"><div class="ds-num" id="ds-total">0</div><div class="ds-label">전체 포인트</div></div>
        <div class="dash-stat"><div class="ds-num" id="ds-records">0</div><div class="ds-label">BMI 기록 수</div></div>
        <div class="dash-stat"><div class="ds-num" id="ds-level">-</div><div class="ds-label">현재 레벨</div></div>
      </div>
      <div class="dash-sec-title">🏆 레벨 진행도</div>
      <div id="dash-lv-dist"></div>
      <div class="dash-sec-title">✅ 미션 완료 현황</div>
      <div id="dash-mission-stat" style="font-family:var(--jua);font-size:12px;color:rgba(200,220,255,.6);"></div>
      <button class="sheets-btn" onclick="sendAllToSheets()"><span>📤</span> 전체 기록 시트에 저장</button>
      <div class="sheets-status" id="sheets-all-status"></div>
    </div>
    <div class="dash-tab-panel" id="tab-bmi">
      <div class="dash-notice">💡 학생의 BMI 기록은 기기에 저장돼요.</div>
      <table class="bmi-table"><thead><tr><th>월</th><th>키</th><th>몸무게</th><th>BMI</th><th>판정</th></tr></thead><tbody id="dash-bmi-tbody"></tbody></table>
      <div id="dash-bmi-empty" style="text-align:center;color:rgba(200,220,255,.4);font-size:12px;padding:12px;font-family:var(--jua);">아직 기록이 없어요</div>
      <button class="sheets-btn" onclick="sendBmiToSheets()"><span>📤</span> BMI 기록 시트에 저장</button>
      <div class="sheets-status" id="sheets-bmi-status"></div>
      <button class="dash-print-btn" style="background:#EF9F27;margin-top:8px;" onclick="clearBmi()">🗑️ BMI 기록 초기화</button>
    </div>
    <div class="dash-tab-panel" id="tab-grant">
      <div class="dash-sec-title" style="margin-top:0;">🎁 포인트 수동 지급</div>
      <input class="dash-input" id="grant-name" placeholder="학생 이름 (기록용)">
      <div class="dash-grant-row">
        <input class="dash-input" id="grant-reason" placeholder="사유" style="flex:2;">
        <input class="dash-input" id="grant-pt" type="number" value="5" min="1" style="flex:1;text-align:center;">
        <button class="dash-grant-btn" onclick="grantPoint()">지급</button>
      </div>
      <div class="dash-sec-title">📋 지급 이력</div>
      <div class="grant-log" id="grant-log"></div>
      <button class="dash-print-btn" style="background:#888;margin-top:8px;" onclick="clearGrantLog()">🗑️ 이력 초기화</button>
    </div>
    <div class="dash-tab-panel" id="tab-memo">
      <div class="dash-sec-title" style="margin-top:0;">📝 수업 메모</div>
      <textarea class="dash-memo" id="teacher-memo" placeholder="수업 메모, 학생 관찰 내용 등을 자유롭게 적어보세요."></textarea>
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px;">
        <button class="memo-save-btn" onclick="saveMemo()">저장</button>
        <span class="memo-saved-msg" id="memo-msg"></span>
      </div>
      <div class="dash-sec-title" style="margin-top:14px;">📅 수업 체크리스트</div>
      <div id="checklist-wrap" style="display:flex;flex-direction:column;gap:6px;"></div>
    </div>
    <div class="dash-tab-panel" id="tab-settings">
      <div class="dash-sec-title" style="margin-top:0;">🔑 비밀번호 변경</div>
      <div style="display:flex;gap:8px;">
        <input class="dash-input" id="new-pw" type="password" placeholder="새 비밀번호" style="flex:1;">
        <button class="dash-grant-btn" onclick="changePw()" style="background:linear-gradient(135deg,#378ADD,#1a5fa8);">변경</button>
      </div>
      <div id="pw-msg" style="font-size:12px;color:#7ADCC8;margin-top:6px;font-family:var(--jua);min-height:18px;"></div>
      <div class="dash-sec-title" style="margin-top:14px;">🗑️ 데이터 관리</div>
      <button class="dash-print-btn" onclick="resetAll()">⚠️ 전체 데이터 초기화</button>
      <div style="font-size:10px;color:rgba(180,195,235,.45);margin-top:6px;font-family:var(--jua);">포인트·BMI·미션 완료 기록이 모두 삭제돼요.</div>
    </div>
    <button class="dash-close-btn" onclick="closeDash()">✕ 닫기</button>
  </div>
</div>

<!-- 레벨 배너 -->
<div class="level-banner">
  <div class="lv-strip">
    <div class="lv-item" id="lv0"><div class="lv-emoji">🐱</div><div class="lv-name">초보 냥이</div><div class="lv-pts">0~2500P</div></div>
    <div class="lv-item" id="lv1"><div class="lv-emoji">🐵</div><div class="lv-name">재간둥이</div><div class="lv-pts">~5000P</div></div>
    <div class="lv-item" id="lv2"><div class="lv-emoji">🐶</div><div class="lv-name">수호대</div><div class="lv-pts">~7500P</div></div>
    <div class="lv-item" id="lv3"><div class="lv-emoji">🐯</div><div class="lv-name">무적 호랑이</div><div class="lv-pts">7501P~</div></div>
  </div>
  <div class="lv-bar-wrap">
    <div class="lv-bar-track"><div class="lv-bar-fill" id="lv-bar" style="width:0%;"></div></div>
    <div class="lv-bar-label" id="lv-bar-label">0P</div>
  </div>
  <div class="lv-pts-input-wrap">
    <span class="lv-pts-input-label">내 포인트:</span>
    <input class="lv-pts-input" id="pts-input" type="number" min="0" placeholder="포인트 입력" inputmode="numeric">
    <button class="lv-pts-save-btn" onclick="savePtsInput()">저장</button>
  </div>
</div>

<!-- 메인 레이아웃 -->
<div class="layout">
  <div class="planet-grid">
    <!-- 신청서 (앞으로 이동) -->
    <a href="https://docs.google.com/forms/d/10Hd0DfOwFndrI78kb3JqTVuPSH6wFnBUkieXcYyQ_e4/viewform" target="_blank" class="planet-btn pb-apply">
      <div class="pb-icon">📋</div>
      <div class="pb-label">신청서</div>
      <div class="pb-sub">프로그램 신청하기</div>
    </a>
    <!-- 오늘의 미션 (뒤로 이동) -->
    <button class="planet-btn pb-mission" onclick="goMission()">
      <div class="pb-icon">🚀</div>
      <div class="pb-label">오늘의 미션</div>
      <div class="pb-sub">매일 미션을 완료하고<br>포인트를 모아요</div>
    </button>
    <!-- 건강놀이터 (포인트 모으는 법 → 건강놀이터) -->
    <button class="planet-btn pb-play" onclick="goPlay()">
      <div class="pb-icon">🛝</div>
      <div class="pb-label">건강놀이터</div>
      <div class="pb-sub">TV · 퀴즈 · 챌린지</div>
    </button>
    <!-- BMI 기록 → 오늘의 체크인 -->
    <button class="planet-btn pb-bmi" onclick="goBmi()">
      <div class="pb-icon">⚖️</div>
      <div class="pb-label">오늘의 체크인</div>
      <div class="pb-sub">키·체중 기록하기</div>
    </button>
  </div>
</div>

<!-- 네비 -->
<div class="nav-row">
  <button class="nav-btn" onclick="goPrev()">← 처음으로</button>
  <button class="nav-btn" style="background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12);" onclick="openAdminLogin()">🔐 교사</button>
  <button class="nav-btn next" onclick="goMission()">미션 →</button>
</div>

</div>
<script>
var LEVELS=[
  {e:'🐱',n:'초보 냥이',max:2500},
  {e:'🐵',n:'재간둥이 원숭이',max:5000},
  {e:'🐶',n:'지구수호대 멍멍이',max:7500},
  {e:'🐯',n:'무적의 호랑이',max:99999}
];
var pts=0;try{pts=parseInt(localStorage.getItem('tuntun_pts')||'0');}catch(e){}
var curLv=pts<=2500?0:pts<=5000?1:pts<=7500?2:3;
function renderLevel(){
  for(var i=0;i<4;i++) document.getElementById('lv'+i).classList.toggle('active',i===curLv);
  var prev=curLv===0?0:LEVELS[curLv-1].max;
  var next=LEVELS[curLv].max===99999?prev+2500:LEVELS[curLv].max;
  var pct=curLv===3?100:Math.min(100,Math.round((pts-prev)/(next-prev)*100));
  document.getElementById('lv-bar').style.width=pct+'%';
  document.getElementById('lv-bar-label').textContent=pts+'P';
  var pi=document.getElementById('pts-input');if(pi&&!pi.value)pi.value=pts||'';
}
renderLevel();
function goPrev(){document.querySelector('.scene').classList.add('page-out');setTimeout(function(){window.location.href='index.html';},400);}
function goMission(){document.querySelector('.scene').classList.add('page-out');setTimeout(function(){window.location.href='page4.html';},400);}
function goPlay(){document.querySelector('.scene').classList.add('page-out');setTimeout(function(){window.location.href='page6.html';},400);}
function goBmi(){document.querySelector('.scene').classList.add('page-out');setTimeout(function(){window.location.href='page6_5.html';},400);}
var ADMIN_PW_KEY='tuntun_admin_pw';
function getAdminPw(){return localStorage.getItem(ADMIN_PW_KEY)||'1234';}
function openAdminLogin(){document.getElementById('admin-modal').classList.add('open');document.getElementById('admin-pw').value='';document.getElementById('admin-err').textContent='';setTimeout(function(){document.getElementById('admin-pw').focus();},100);}
function closeAdminLogin(){document.getElementById('admin-modal').classList.remove('open');}
function checkAdmin(){var pw=document.getElementById('admin-pw').value;if(pw===getAdminPw()){closeAdminLogin();openDash();}else{document.getElementById('admin-err').textContent='❌ 비밀번호가 틀렸어요';document.getElementById('admin-pw').value='';document.getElementById('admin-pw').focus();}}
function changePw(){var v=document.getElementById('new-pw').value.trim();if(!v){document.getElementById('pw-msg').textContent='비밀번호를 입력해 주세요';return;}localStorage.setItem(ADMIN_PW_KEY,v);document.getElementById('pw-msg').textContent='✅ 변경 완료!';document.getElementById('new-pw').value='';}
function openDash(){
  document.getElementById('dash-panel').classList.add('open');
  var now=new Date();document.getElementById('dash-datetime').textContent=now.getFullYear()+'.'+(now.getMonth()+1)+'.'+now.getDate()+' '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  renderDashStats();renderBmiTable();renderMissionStat();renderLvDist();loadMemo();renderChecklist();
}
function closeDash(){document.getElementById('dash-panel').classList.remove('open');}
function switchTab(id,el){
  document.querySelectorAll('.dash-tab-panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.dash-tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById(id).classList.add('active');if(el)el.classList.add('active');
}
function renderDashStats(){
  var p=parseInt(localStorage.getItem('tuntun_pts')||'0');
  var recs={};try{recs=JSON.parse(localStorage.getItem('tuntun_body_records_v2')||'{}');}catch(e){}
  var lv=p<=2500?'1단계':p<=5000?'2단계':p<=7500?'3단계':'4단계';
  document.getElementById('ds-total').textContent=p+'P';
  document.getElementById('ds-records').textContent=Object.keys(recs).length+'건';
  document.getElementById('ds-level').textContent=lv;
}
function renderLvDist(){
  var p=parseInt(localStorage.getItem('tuntun_pts')||'0');
  var lv=p<=2500?0:p<=5000?1:p<=7500?2:3;
  var levels=[{name:'1단계 🌱',max:2500,c:'#5DCAA5'},{name:'2단계 🧭',max:5000,c:'#378ADD'},{name:'3단계 🏅',max:7500,c:'#EF9F27'},{name:'4단계 🦸',max:99999,c:'#D85A30'}];
  var prev=lv===0?0:levels[lv-1].max;var next=lv===3?prev+2500:levels[lv].max;
  var pct=lv===3?100:Math.min(100,Math.round((p-prev)/(next-prev)*100));
  var html='';levels.forEach(function(l,i){var bp=i<lv?100:i===lv?pct:0;html+='<div class="lv-dist-row"><span class="lv-dist-label">'+l.name+'</span><div class="lv-dist-bar-wrap"><div class="lv-dist-bar" style="width:'+bp+'%;background:'+l.c+';"></div></div><span class="lv-dist-count">'+(i===lv?pct+'%':i<lv?'✓':'-')+'</span></div>';});
  document.getElementById('dash-lv-dist').innerHTML=html;
}
function renderMissionStat(){
  var done=0;try{var md=JSON.parse(localStorage.getItem('tuntun_missions_daily')||'{}');if(md.missions)Object.values(md.missions).forEach(function(v){if(v)done++;});}catch(e){}
  document.getElementById('dash-mission-stat').textContent='오늘 완료한 미션: '+done+'개';
}
function renderBmiTable(){
  var recs={};try{recs=JSON.parse(localStorage.getItem('tuntun_body_records_v2')||'{}');}catch(e){}
  var keys=Object.keys(recs).sort();
  var tbody=document.getElementById('dash-bmi-tbody');
  var empty=document.getElementById('dash-bmi-empty');
  if(!keys.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=keys.map(function(k){var r=recs[k];return '<tr><td>'+k+'</td><td>'+r.h+'cm</td><td>'+r.w+'kg</td><td>'+r.bmi+'</td><td>'+r.status+'</td></tr>';}).join('');
}
function grantPoint(){
  var name=document.getElementById('grant-name').value||'미입력';
  var reason=document.getElementById('grant-reason').value||'수동 지급';
  var pt=parseInt(document.getElementById('grant-pt').value)||5;
  var cur=parseInt(localStorage.getItem('tuntun_pts')||'0');
  localStorage.setItem('tuntun_pts',cur+pt);
  var log=[];try{log=JSON.parse(localStorage.getItem('tuntun_grant_log')||'[]');}catch(e){}
  var now=new Date();log.unshift({name:name,reason:reason,pt:pt,time:now.getMonth()+1+'/'+now.getDate()+' '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')});
  localStorage.setItem('tuntun_grant_log',JSON.stringify(log.slice(0,50)));
  document.getElementById('grant-log').innerHTML=log.map(function(l){return '<div class="grant-log-item">'+l.time+' | '+l.name+' | '+l.reason+' | +'+l.pt+'P</div>';}).join('');
  alert('✅ '+pt+'P 지급 완료!');
  pts=parseInt(localStorage.getItem('tuntun_pts')||'0');curLv=pts<=2500?0:pts<=5000?1:pts<=7500?2:3;renderLevel();
}
function clearGrantLog(){if(!confirm('지급 이력을 초기화할까요?'))return;localStorage.removeItem('tuntun_grant_log');document.getElementById('grant-log').innerHTML='';}
function saveMemo(){localStorage.setItem('tuntun_memo',document.getElementById('teacher-memo').value);document.getElementById('memo-msg').textContent='✅ 저장됨';setTimeout(function(){document.getElementById('memo-msg').textContent='';},2000);}
function loadMemo(){document.getElementById('teacher-memo').value=localStorage.getItem('tuntun_memo')||'';}
function renderChecklist(){var items=['미션 안내 완료','인증 확인','포인트 지급 완료','다음 수업 준비'];var wrap=document.getElementById('checklist-wrap');var saved={};try{saved=JSON.parse(localStorage.getItem('tuntun_checklist')||'{}');}catch(e){}wrap.innerHTML=items.map(function(item,i){return '<div class="checklist-item"><input type="checkbox" id="ck'+i+'" '+(saved[i]?'checked':'')+' onchange="saveCk('+i+',this.checked)"> <label for="ck'+i+'">'+item+'</label></div>';}).join('');}
function saveCk(i,v){var saved={};try{saved=JSON.parse(localStorage.getItem('tuntun_checklist')||'{}');}catch(e){}saved[i]=v;localStorage.setItem('tuntun_checklist',JSON.stringify(saved));}
function resetAll(){if(!confirm('⚠️ 모든 데이터를 초기화할까요? 되돌릴 수 없어요.'))return;['tuntun_pts','tuntun_missions_daily','tuntun_body_records_v2','tuntun_grant_log','tuntun_memo'].forEach(function(k){localStorage.removeItem(k);});alert('초기화 완료!');closeDash();}
var SHEETS_URL='https://script.google.com/macros/s/AKfycbzgBrjUH2rf1mUcyFp2GGWGvDaUnmIh0kV0rskcDB5j84Esu1IFbcJFHy4BQ93vUPc2/exec';
function sendAllToSheets(){document.getElementById('sheets-all-status').textContent='전송 중...';var p=parseInt(localStorage.getItem('tuntun_pts')||'0');var lv=p<=2500?'1단계':p<=5000?'2단계':p<=7500?'3단계':'4단계';fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'all',pts:p,level:lv})}).then(function(){document.getElementById('sheets-all-status').textContent='✅ 전송 완료!';}).catch(function(){document.getElementById('sheets-all-status').textContent='❌ 오류';});}
function sendBmiToSheets(){var recs={};try{recs=JSON.parse(localStorage.getItem('tuntun_body_records_v2')||'{}');}catch(e){}document.getElementById('sheets-bmi-status').textContent='전송 중...';fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'bmi',records:recs})}).then(function(){document.getElementById('sheets-bmi-status').textContent='✅ 전송 완료!';}).catch(function(){document.getElementById('sheets-bmi-status').textContent='❌ 오류';});}
function clearBmi(){if(!confirm('BMI 기록을 초기화할까요?'))return;localStorage.removeItem('tuntun_body_records_v2');renderBmiTable();}
var lt=0;document.addEventListener('touchend',function(e){var n=Date.now();if(n-lt<300)e.preventDefault();lt=n;},{passive:false});
</script>
</body>
</html>
