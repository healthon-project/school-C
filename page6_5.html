<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>튼튼탐험대 — 오늘의 체크인</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'KH';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/KyoboHand.woff') format('woff');}
:root{--jua:'Jua',sans-serif;--hand:'KH',sans-serif;--green:#1D9E75;--green2:#5DCAA5;--blue:#378ADD;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{font-family:var(--jua);background:#04061A;color:#fff;overflow-x:hidden;min-height:100%;}
.scene{min-height:100vh;background:radial-gradient(ellipse at 50% 20%,rgba(55,138,221,.07),transparent 50%),radial-gradient(ellipse at 20% 80%,rgba(93,202,165,.06),transparent 50%),linear-gradient(170deg,#04061A,#0B0E2A 50%,#0E1535);display:flex;flex-direction:column;align-items:center;}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.55),transparent),radial-gradient(1px 1px at 28% 8%,rgba(255,255,255,.45),transparent),radial-gradient(1.5px 1.5px at 45% 22%,rgba(255,255,255,.6),transparent),radial-gradient(1px 1px at 62% 6%,rgba(255,255,255,.7),transparent),radial-gradient(1px 1px at 78% 16%,rgba(255,255,255,.4),transparent),radial-gradient(1px 1px at 5% 38%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 52% 42%,rgba(255,255,255,.3),transparent),radial-gradient(1px 1px at 87% 36%,rgba(255,255,255,.65),transparent),radial-gradient(1px 1px at 16% 57%,rgba(255,255,255,.4),transparent),radial-gradient(1px 1px at 72% 54%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 37% 69%,rgba(255,255,255,.3),transparent),radial-gradient(1px 1px at 82% 72%,rgba(255,255,255,.4),transparent),radial-gradient(1px 1px at 9% 82%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 47% 89%,rgba(255,255,255,.3),transparent),radial-gradient(1px 1px at 20% 4%,rgba(255,255,255,.6),transparent),radial-gradient(1px 1px at 55% 30%,rgba(255,255,255,.35),transparent),radial-gradient(1px 1px at 88% 25%,rgba(255,255,255,.5),transparent);}

/* ── 레벨 배너 ── */
.level-banner{position:relative;z-index:10;width:100%;max-width:430px;margin-top:10px;padding:0 14px;animation:fadeDown .5s ease both;}
.lv-strip{background:rgba(255,255,255,.06);border:1px solid rgba(200,220,255,.15);border-radius:16px;padding:8px 12px;display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.lv-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 3px;border-radius:10px;}
.lv-item.active{background:rgba(255,255,255,.1);}
.lv-emoji{font-size:18px;line-height:1;}
.lv-item.active .lv-emoji{font-size:24px;}
.lv-name{font-size:9px;color:rgba(200,220,255,.5);text-align:center;line-height:1.2;}
.lv-item.active .lv-name{color:rgba(255,255,255,.85);}
.lv-pts{font-size:8px;color:rgba(200,220,255,.3);}
.lv-item.active .lv-pts{color:#FFD86E;}
.lv-bar-wrap{display:flex;align-items:center;gap:6px;margin-top:6px;padding:0 2px;}
.lv-bar-track{flex:1;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.lv-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--green2));}
.lv-bar-label{font-size:11px;color:#FFD86E;white-space:nowrap;}
/* ── 포인트 직접 입력 ── */
.lv-pts-input-wrap{margin-top:8px;display:flex;align-items:center;gap:8px;padding:0 2px;}
.lv-pts-input-label{font-size:11px;color:rgba(200,220,255,.55);white-space:nowrap;flex-shrink:0;}
.lv-pts-input{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,216,110,.3);border-radius:10px;padding:7px 10px;font-family:var(--jua);font-size:15px;color:#FFD86E;outline:none;text-align:center;min-width:0;}
.lv-pts-input:focus{border-color:rgba(255,216,110,.65);background:rgba(255,255,255,.14);}
.lv-pts-input::placeholder{color:rgba(255,216,110,.3);font-size:13px;}
.lv-pts-save-btn{padding:7px 14px;background:rgba(255,216,110,.15);border:1px solid rgba(255,216,110,.35);border-radius:10px;font-family:var(--jua);font-size:13px;color:#FFD86E;cursor:pointer;white-space:nowrap;transition:.15s;flex-shrink:0;}
.lv-pts-save-btn:active{transform:scale(.95);background:rgba(255,216,110,.25);}

/* ── 콘텐츠 ── */
.content{position:relative;z-index:10;width:100%;max-width:430px;padding:0 16px 100px;}
.page-header{margin-top:14px;text-align:center;animation:fadeDown .5s ease both;}
.header-badge{display:inline-block;background:rgba(55,138,221,.18);border:1px solid rgba(55,138,221,.35);color:#9DCFFF;font-size:13px;padding:4px 14px;border-radius:100px;margin-bottom:8px;}
.page-title{font-family:var(--hand);font-size:clamp(22px,6vw,28px);color:#fff;line-height:1.2;}
.page-sub{font-size:12px;color:rgba(200,220,255,.65);margin-top:5px;}

/* ── 학번·이름 입력 ── */
.student-card{margin-top:14px;background:rgba(127,119,221,.08);border:1.5px solid rgba(127,119,221,.25);border-radius:20px;padding:14px 16px;animation:fadeUp .5s ease .05s both;}
.student-card-title{font-size:12px;color:rgba(200,220,255,.55);margin-bottom:10px;}
.student-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.student-label{font-size:11px;color:rgba(200,220,255,.55);margin-bottom:4px;display:block;}
.student-input{width:100%;padding:10px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(127,119,221,.3);border-radius:12px;font-size:16px;color:#fff;outline:none;font-family:var(--jua);text-align:center;}
.student-input:focus{border-color:rgba(127,119,221,.6);background:rgba(255,255,255,.12);}
.student-input::placeholder{color:rgba(200,220,255,.25);font-size:13px;}
.student-save-btn{margin-top:10px;width:100%;padding:10px;background:rgba(127,119,221,.2);border:1px solid rgba(127,119,221,.4);border-radius:12px;font-family:var(--jua);font-size:14px;color:#C8B4FF;cursor:pointer;transition:.15s;}
.student-save-btn:active{transform:scale(.97);}
.student-saved-badge{display:none;margin-top:8px;text-align:center;font-size:12px;color:#5DCAA5;}
.bmi-input-card{margin-top:14px;background:rgba(55,138,221,.08);border:1.5px solid rgba(55,138,221,.25);border-radius:20px;padding:16px;animation:fadeUp .5s ease .1s both;}
.bmi-month-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.ci-month-btn{padding:5px 10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:100px;font-size:12px;color:rgba(200,220,255,.6);cursor:pointer;transition:.15s;font-family:var(--jua);}
.ci-month-btn.active{background:rgba(55,138,221,.3);border-color:rgba(55,138,221,.5);color:#fff;}
.bmi-input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.bmi-label{font-size:11px;color:rgba(200,220,255,.55);margin-bottom:4px;display:block;}
.bmi-input{width:100%;padding:11px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(55,138,221,.3);border-radius:12px;font-size:18px;color:#fff;outline:none;font-family:var(--jua);text-align:center;}
.bmi-input:focus{border-color:rgba(55,138,221,.6);background:rgba(255,255,255,.1);}
.bmi-input::placeholder{color:rgba(200,220,255,.25);font-size:14px;}
.bmi-calc-btn{width:100%;padding:12px;background:linear-gradient(135deg,#378ADD,#185FA5);color:#fff;border:none;border-radius:14px;font-family:var(--jua);font-size:16px;cursor:pointer;transition:transform .15s;}
.bmi-calc-btn:active{transform:scale(.97);}

/* ── BMI 결과 ── */
.bmi-result{margin-top:10px;display:none;background:rgba(255,255,255,.06);border-radius:14px;padding:14px;text-align:center;}
.bmi-result.show{display:block;}
.bmi-result-num{font-size:40px;font-weight:700;color:#fff;}
.bmi-result-status{font-size:18px;margin-top:4px;}
.bmi-result-bar{height:8px;background:rgba(255,255,255,.1);border-radius:4px;margin:10px 0 4px;overflow:hidden;}
.bmi-result-fill{height:100%;border-radius:4px;transition:width .5s;}

/* ── 기록 히스토리 ── */
.bmi-history{margin-top:14px;animation:fadeUp .5s ease .2s both;}
.bmi-history-title{font-size:13px;color:rgba(200,220,255,.55);margin-bottom:8px;}
.bmi-history-list{display:flex;flex-direction:column;gap:6px;}
.bmi-hist-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.bmi-hist-month{font-size:13px;color:#9DCFFF;font-weight:700;width:30px;flex-shrink:0;}
.bmi-hist-data{flex:1;font-size:12px;color:rgba(200,220,255,.7);}
.bmi-hist-status{font-size:12px;}
.bmi-hist-trend{font-size:16px;}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#378ADD;color:#fff;font-size:14px;padding:9px 20px;border-radius:100px;z-index:100;display:none;white-space:nowrap;}

/* ── 네비 ── */
.nav-bar{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;justify-content:center;gap:12px;padding:12px 20px 22px;background:linear-gradient(to top,rgba(4,6,26,.95) 60%,transparent);}
.nav-btn{flex:1;max-width:160px;display:flex;align-items:center;justify-content:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:100px;padding:10px 0;font-family:var(--jua);font-size:14px;color:#fff;cursor:pointer;transition:transform .15s;}
.nav-btn:active{transform:scale(.95);}
.nav-btn.home{background:rgba(29,158,117,.3);border-color:rgba(93,202,165,.4);}

@keyframes fadeDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.page-out{animation:pageOut .4s ease forwards!important;}
@keyframes pageOut{to{opacity:0;transform:translateY(-12px);}}
</style>

<!-- ✅ Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
var _fbApp = firebase.initializeApp({
  apiKey: "AIzaSyA8DcrxX0l_94zkBTs-TtDSVoY5slUNbNk",
  authDomain: "healthon-project02.firebaseapp.com",
  projectId: "healthon-project02",
  storageBucket: "healthon-project02.firebasestorage.app",
  messagingSenderId: "188732634434",
  appId: "1:188732634434:web:bd0aab6f7e10f5b912c4db",
  measurementId: "G-Y0XPXJTFXM"
});
var _db = firebase.firestore();

/* ── Firebase 헬퍼 ────────────────────────────────────
   학번(student_id)을 키로 Firestore에 데이터 저장/읽기
   컬렉션: students / document: {student_id}
──────────────────────────────────────────────────── */
function _getSid(){return localStorage.getItem('tuntun_student_id')||'guest_'+((navigator.userAgent+screen.width).hashCode?'x':Math.abs(Array.from(navigator.userAgent).reduce(function(a,c){return a+c.charCodeAt(0);},0)%90000+10000));}

function fbSave(field, value){
  var sid=_getSid();
  if(!sid) return; // 학번 없으면 저장 안 함
  var doc={};
  doc[field]=value;
  doc['name']=localStorage.getItem('tuntun_student_name')||'';
  doc['updatedAt']=firebase.firestore.FieldValue.serverTimestamp();
  _db.collection('students').doc(sid).set(doc,{merge:true}).catch(function(e){console.warn('FB save err',e);});
}

function fbLoad(sid, callback){
  if(!sid){callback({});return;}
  _db.collection('students').doc(sid).get().then(function(snap){
    callback(snap.exists?snap.data():{});
  }).catch(function(){callback({});});
}
</script>
</head>
<body>
<div class="scene">
<div class="stars"></div>
<div class="toast" id="toast"></div>

<!-- 레벨 배너 -->
<div class="level-banner">
  <div class="lv-strip">
    <div class="lv-item" id="lv0"><div class="lv-emoji">🐱</div><div class="lv-name">초보 냥이</div><div class="lv-pts">0~450P</div></div>
    <div class="lv-item" id="lv1"><div class="lv-emoji">🐵</div><div class="lv-name">재간둥이</div><div class="lv-pts">~1200P</div></div>
    <div class="lv-item" id="lv2"><div class="lv-emoji">🐶</div><div class="lv-name">수호대</div><div class="lv-pts">~2200P</div></div>
    <div class="lv-item" id="lv3"><div class="lv-emoji">🐯</div><div class="lv-name">무적 호랑이</div><div class="lv-pts">3000P~</div></div>
  </div>
  <div class="lv-bar-wrap">
    <div class="lv-bar-track"><div class="lv-bar-fill" id="lv-bar" style="width:0%;"></div></div>
    <div class="lv-bar-label" id="lv-bar-label">0P</div>
  </div>
  <div class="lv-pts-input-wrap">
    <span class="lv-pts-input-label">이번달 내 포인트:</span>
    <input class="lv-pts-input" id="pts-input" type="number" min="0" placeholder="포인트 입력" inputmode="numeric">
    <button class="lv-pts-save-btn" onclick="savePtsInput()">저장</button>
  </div>
</div>

<div class="content">
  <div class="page-header">
    <div class="header-badge">⚖️ 건강 기록</div>
    <div class="page-title">오늘의 체크인 📊</div>
    <div class="page-sub">매월 키와 몸무게를 기록해요</div>
  </div>

  <!-- 학번·이름 입력 -->
  <div class="student-card">
    <div class="student-card-title">👤 내 정보를 먼저 입력해줘요 (한 번만!)</div>
    <div class="student-row">
      <div>
        <span class="student-label">🔢 학번반번호 (4자리)</span>
        <input class="student-input" id="student-id" type="number" inputmode="numeric" placeholder="예) 1205" maxlength="6">
      </div>
      <div>
        <span class="student-label">✏️ 이름</span>
        <input class="student-input" id="student-name" type="text" placeholder="예) 홍길동">
      </div>
    </div>
    <button class="student-save-btn" onclick="saveStudentInfo()">✅ 저장하기</button>
    <button id="student-edit-btn" style="display:none;margin-top:10px;width:100%;padding:8px;background:transparent;border:1px solid rgba(200,220,255,.2);border-radius:12px;font-family:var(--jua);font-size:12px;color:rgba(200,220,255,.45);cursor:pointer;" onclick="editStudentInfo()">✏️ 수정하기</button>
    <div class="student-saved-badge" id="student-saved-badge">저장됨 ✓ <span id="student-saved-text"></span></div>
  </div>

  <!-- BMI 입력 -->
  <div class="bmi-input-card">
    <div class="bmi-month-row" id="month-btns"></div>
    <div class="bmi-input-row">
      <div>
        <span class="bmi-label">📏 키 (cm)</span>
        <input class="bmi-input" id="ci-height" type="number" placeholder="예) 145" min="80" max="220">
      </div>
      <div>
        <span class="bmi-label">⚖️ 몸무게 (kg)</span>
        <input class="bmi-input" id="ci-weight" type="number" placeholder="예) 42" min="10" max="200">
      </div>
    </div>
    <button class="bmi-calc-btn" onclick="ciCalcBMI()">📊 BMI 계산하고 저장하기</button>
    <div class="bmi-result" id="bmi-result">
      <div class="bmi-result-num" id="bmi-val">--</div>
      <div class="bmi-result-status" id="bmi-status"></div>
      <div class="bmi-result-bar"><div class="bmi-result-fill" id="bmi-bar" style="width:0%;"></div></div>
    </div>
  </div>

  <!-- 히스토리 -->
  <div class="bmi-history">
    <div class="bmi-history-title">📋 월별 기록</div>
    <div class="bmi-history-list" id="bmi-hist-list">
      <div style="font-size:12px;color:rgba(200,220,255,.4);text-align:center;padding:12px;">아직 기록이 없어요</div>
    </div>
  </div>

  <!-- 마무리 멘트 -->
  <div style="margin-top:28px;text-align:center;padding:20px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(200,220,255,.1);border-radius:20px;animation:fadeUp .5s ease .3s both;">
    <div style="font-size:36px;margin-bottom:10px;">🎉🌟💪</div>
    <div style="font-family:'KH',sans-serif;font-size:clamp(18px,5vw,22px);color:#fff;line-height:1.6;margin-bottom:6px;">수고하셨습니다!</div>
    <div style="font-size:13px;color:rgba(200,220,255,.65);line-height:1.7;">오늘도 건강한 하루를 보낸<br>나 자신을 칭찬해 줘요 👏</div>
  </div>
</div>

<div class="nav-bar">
  <button class="nav-btn" onclick="goPrev()">← 이전</button>
  <button class="nav-btn home" onclick="goHome()">🏠 홈으로</button>
</div>
</div>
<script>
var pts=0;try{pts=parseInt(localStorage.getItem('tuntun_pts')||'0');}catch(e){}
var curLv=pts<=450?0:pts<=1200?1:pts<=2200?2:3;
(function(){for(var i=0;i<4;i++)document.getElementById('lv'+i).classList.toggle('active',i===curLv);var maxes=[450,1200,2200,3000];var prev=curLv===0?0:maxes[curLv-1];var next=maxes[curLv]===3000?prev+800:maxes[curLv];var pct=curLv===3?100:Math.min(100,Math.round((pts-prev)/(next-prev)*100));document.getElementById('lv-bar').style.width=pct+'%';document.getElementById('lv-bar-label').textContent=pts+'P';var pi=document.getElementById('pts-input');if(pi)pi.value=pts||'';})();

var CI_STORAGE='tuntun_body_records_v2';
var SHEETS_URL='https://script.google.com/macros/s/AKfycbxIMa_RHfLoHQyyPu-i5K6XNtbqhnUBlBDEhvegHpTi2d6LnyD8Vu9ZwSBKfQ_wsvBu/exec';
var ciMonth=new Date().getMonth()+1;if(ciMonth<6)ciMonth=6;if(ciMonth>12)ciMonth=12;
var recs={};try{recs=JSON.parse(localStorage.getItem(CI_STORAGE)||'{}');}catch(e){}

/* 학번·이름 불러오기 */
(function loadStudentInfo(){
  var sid=localStorage.getItem('tuntun_student_id')||'';
  var sname=localStorage.getItem('tuntun_student_name')||'';
  if(sid||sname){
    document.getElementById('student-id').value=sid;
    document.getElementById('student-name').value=sname;
    /* 입력칸 잠금, 저장버튼 숨김 */
    document.getElementById('student-id').readOnly=true;
    document.getElementById('student-name').readOnly=true;
    document.getElementById('student-id').style.opacity='0.6';
    document.getElementById('student-name').style.opacity='0.6';
    document.querySelector('.student-save-btn').style.display='none';
    document.getElementById('student-saved-badge').style.display='block';
    document.getElementById('student-saved-text').textContent=sid+' '+sname;
    document.getElementById('student-edit-btn').style.display='block';
  }
})();

function saveStudentInfo(){
  var sid=document.getElementById('student-id').value.trim();
  var sname=document.getElementById('student-name').value.trim();
  if(!sid&&!sname){showToast('학번 또는 이름을 입력해 주세요!');return;}
  if(sid){localStorage.setItem('tuntun_student_id',sid);}
  if(sname){localStorage.setItem('tuntun_student_name',sname);fbSave('name',sname);}
  /* 저장 후 잠금 */
  document.getElementById('student-id').readOnly=true;
  document.getElementById('student-name').readOnly=true;
  document.getElementById('student-id').style.opacity='0.6';
  document.getElementById('student-name').style.opacity='0.6';
  document.querySelector('.student-save-btn').style.display='none';
  document.getElementById('student-saved-badge').style.display='block';
  document.getElementById('student-saved-text').textContent=sid+' '+sname;
  document.getElementById('student-edit-btn').style.display='block';
  showToast('✅ 정보가 저장됐어요!');
}

function editStudentInfo(){
  document.getElementById('student-id').readOnly=false;
  document.getElementById('student-name').readOnly=false;
  document.getElementById('student-id').style.opacity='1';
  document.getElementById('student-name').style.opacity='1';
  document.querySelector('.student-save-btn').style.display='block';
  document.getElementById('student-edit-btn').style.display='none';
  document.getElementById('student-saved-badge').style.display='none';
}

(function renderMonthBtns(){
  var wrap=document.getElementById('month-btns');
  for(var m=6;m<=12;m++){
    var btn=document.createElement('button');
    btn.className='ci-month-btn'+(m===ciMonth?' active':'');
    btn.textContent=m+'월';btn.dataset.m=m;
    btn.onclick=function(){ciSelectMonth(parseInt(this.dataset.m),this);};
    wrap.appendChild(btn);
  }
  if(recs[ciMonth]){document.getElementById('ci-height').value=recs[ciMonth].h;document.getElementById('ci-weight').value=recs[ciMonth].w;ciShowResult(recs[ciMonth].bmi);}
})();

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none';},2200);}
function getBmiStatus(bmi){if(bmi<18.5)return{text:'저체중 😢',color:'#378ADD',pct:20};if(bmi<23)return{text:'정상 😊',color:'#1D9E75',pct:50};if(bmi<25)return{text:'과체중 ⚠️',color:'#EF9F27',pct:70};return{text:'비만 ❗',color:'#D85A30',pct:90};}
function ciSelectMonth(m,el){
  ciMonth=m;
  document.querySelectorAll('.ci-month-btn').forEach(function(b){b.classList.remove('active');});
  if(el)el.classList.add('active');
  if(recs[m]){document.getElementById('ci-height').value=recs[m].h;document.getElementById('ci-weight').value=recs[m].w;ciShowResult(recs[m].bmi);}
  else{document.getElementById('ci-height').value='';document.getElementById('ci-weight').value='';document.getElementById('bmi-result').classList.remove('show');}
}
function ciShowResult(bmi){
  var st=getBmiStatus(bmi);
  document.getElementById('bmi-result').classList.add('show');
  document.getElementById('bmi-val').textContent=bmi.toFixed(1);
  document.getElementById('bmi-status').textContent=st.text;
  var bar=document.getElementById('bmi-bar');bar.style.width=st.pct+'%';bar.style.background=st.color;
}
function ciCalcBMI(){
  var h=parseFloat(document.getElementById('ci-height').value);
  var w=parseFloat(document.getElementById('ci-weight').value);
  if(!h||!w||h<80||h>220||w<10||w>200){showToast('키와 몸무게를 올바르게 입력해 주세요!');return;}
  var bmi=w/((h/100)*(h/100));
  var st=getBmiStatus(bmi);
  var sid=localStorage.getItem('tuntun_student_id')||'미입력';
  var sname=localStorage.getItem('tuntun_student_name')||'미입력';
  recs[ciMonth]={h:h,w:w,bmi:Math.round(bmi*10)/10,status:st.text.replace(/ .*/,''),number:sid,name:sname};
  try{localStorage.setItem(CI_STORAGE,JSON.stringify(recs));}catch(e){}fbSave('bodyRecords',recs);
  ciShowResult(bmi);
  showToast(ciMonth+'월 기록 저장 완료! 🔒');
  renderHistory();
  /* 구글 시트 전송 */
  fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'bmi',number:sid,name:sname,month:ciMonth,height:h,weight:w,bmi:Math.round(bmi*10)/10,status:st.text.replace(/ .*/,''),school:'C'})}).catch(function(){});
}
function renderHistory(){
  var keys=Object.keys(recs).map(Number).sort(function(a,b){return a-b;});
  var list=document.getElementById('bmi-hist-list');
  if(!keys.length){list.innerHTML='<div style="font-size:12px;color:rgba(200,220,255,.4);text-align:center;padding:12px;">아직 기록이 없어요</div>';return;}
  list.innerHTML=keys.map(function(m,idx){
    var r=recs[m];var st=getBmiStatus(r.bmi);var trend='';
    if(idx>0){var pm=keys[idx-1];var prev=recs[pm];trend=r.bmi<prev.bmi?'📉':r.bmi>prev.bmi?'📈':'➡️';}
    return '<div class="bmi-hist-item"><div class="bmi-hist-month">'+m+'월</div><div class="bmi-hist-data">'+r.h+'cm · '+r.w+'kg</div><div class="bmi-hist-status">'+st.text+'</div>'+(trend?'<div class="bmi-hist-trend">'+trend+'</div>':'')+'</div>';
  }).join('');
}
renderHistory();
function savePtsInput(){
  var v=parseInt(document.getElementById('pts-input').value);
  if(isNaN(v)||v<0){return;}
  localStorage.setItem('tuntun_pts',v);fbSave('totalPts',v);
  pts=v;curLv=pts<=450?0:pts<=1200?1:pts<=2200?2:3;
  (function(){for(var i=0;i<4;i++)document.getElementById('lv'+i).classList.toggle('active',i===curLv);var maxes=[450,1200,2200,3000];var prev=curLv===0?0:maxes[curLv-1];var next=maxes[curLv]===3000?prev+800:maxes[curLv];var pct=curLv===3?100:Math.min(100,Math.round((pts-prev)/(next-prev)*100));document.getElementById('lv-bar').style.width=pct+'%';document.getElementById('lv-bar-label').textContent=pts+'P';var pi=document.getElementById('pts-input');if(pi)pi.value=pts||'';})();
  var btn=document.querySelector('.lv-pts-save-btn');
  if(btn){btn.textContent='✅ 저장!';setTimeout(function(){btn.textContent='저장';},1500);}
}
function goPrev(){document.querySelector('.scene').classList.add('page-out');setTimeout(function(){window.location.href='page3.html';},400);}
function goHome(){document.querySelector('.scene').classList.add('page-out');setTimeout(function(){window.location.href='page3.html';},400);}
var lt=0;document.addEventListener('touchend',function(e){var n=Date.now();if(n-lt<300)e.preventDefault();lt=n;},{passive:false});
</script>
</body>
