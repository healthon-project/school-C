<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>튼튼탐험대 — 보물 포인트 모으는 법</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <style>
    @font-face {
      font-family: 'KyoboHand';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/KyoboHand.woff') format('woff');
      font-weight: normal; font-style: normal;
    }
    :root { --title-font:'KyoboHand',sans-serif; --main-font:'Jua',sans-serif; }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{width:100%;min-height:100%;font-family:var(--main-font);background:#04061A;overflow-x:hidden;}
    .scene{min-height:100vh;position:relative;display:flex;flex-direction:column;align-items:center;}
    #star-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .shoot{position:fixed;width:80px;height:1.5px;background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,0.8));border-radius:2px;left:-90px;z-index:1;pointer-events:none;}
    .sh1{top:4%;animation:sh 7s linear 1s infinite;}
    .sh2{top:11%;animation:sh 10s linear 5s infinite;}
    @keyframes sh{from{transform:translateX(0) rotate(18deg);opacity:1;}to{transform:translateX(120vw) rotate(18deg);opacity:0;}}

    .content{position:relative;z-index:10;width:100%;max-width:430px;padding:0 18px 120px;display:flex;flex-direction:column;align-items:center;}

    .step-title-wrap{margin-top:3.5vh;width:100%;text-align:center;animation:fadeDown 0.5s ease both;}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    .step-label{display:block;font-family:var(--main-font);font-size:15px;color:rgba(255,255,255,0.65);margin-bottom:5px;letter-spacing:1px;}
    .step-main-title{font-family:var(--title-font);font-size:clamp(22px,5.8vw,28px);line-height:1.3;background:linear-gradient(135deg,#FFE066,#FFB347,#FFE066);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 10px rgba(255,200,0,0.35));animation:titleShimmer 3s linear infinite;background-size:200% auto;}
    @keyframes titleShimmer{0%{background-position:0%}100%{background-position:200%}}
    @keyframes treasureBounce{0%,100%{transform:translateY(0) rotate(-6deg);}50%{transform:translateY(-6px) rotate(6deg);}}

    .card-wrap{margin-top:3vh;width:100%;display:flex;flex-direction:column;gap:20px;animation:fadeUp 0.5s ease 0.1s both;}

    /* ═══ 퀴즈 카드 ═══ */
    .card-quiz{width:100%;border-radius:22px;border:2px solid rgba(130,180,255,0.35);background:linear-gradient(135deg,rgba(30,50,110,0.88) 0%,rgba(15,30,80,0.97) 100%);box-shadow:0 0 32px rgba(80,140,255,0.15),inset 0 1px 0 rgba(255,255,255,0.07);overflow:hidden;}

    .quiz-illust{position:relative;width:100%;height:160px;overflow:hidden;background:linear-gradient(160deg,#0A1A4E 0%,#142060 55%,#1A2A80 100%);}
    .qm{position:absolute;font-family:var(--title-font);font-weight:900;animation:floatQ 3s ease-in-out infinite;}
    @keyframes floatQ{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-8px) rotate(5deg);}}
    .qm1{font-size:70px;color:rgba(255,220,60,0.9);top:12px;left:14px;text-shadow:0 0 20px rgba(255,200,0,0.5);}
    .qm2{font-size:42px;color:rgba(120,180,255,0.6);top:6px;right:24px;animation-delay:0.7s;}
    .qm3{font-size:26px;color:rgba(200,130,255,0.55);bottom:18px;left:48%;animation-delay:1.3s;}
    .sp{position:absolute;border-radius:50%;animation:sparkle 2s ease-in-out infinite;}
    @keyframes sparkle{0%,100%{opacity:0.25;transform:scale(0.8);}50%{opacity:1;transform:scale(1.3);}}
    .sp1{width:8px;height:8px;background:#FFE066;top:16px;right:50px;animation-delay:0.2s;}
    .sp2{width:5px;height:5px;background:#A0CFFF;bottom:28px;left:76px;animation-delay:0.9s;}
    .sp3{width:6px;height:6px;background:#E0A0FF;top:45%;right:12px;animation-delay:1.6s;}
    .sp4{width:7px;height:7px;background:#FFD080;bottom:16px;right:85px;animation-delay:0.5s;}
    .quiz-chars{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:flex-end;padding:0 12px;gap:6px;}

    .quiz-info{padding:12px 18px 6px;display:flex;align-items:center;justify-content:space-between;}
    .card-tag-quiz{display:inline-block;background:rgba(100,160,255,0.18);border:1px solid rgba(100,160,255,0.35);color:#92C8FF;font-size:11px;padding:3px 10px;border-radius:100px;margin-bottom:6px;}
    .quiz-title{font-family:var(--title-font);font-size:clamp(17px,4.5vw,20px);color:#fff;line-height:1.2;}
    .quiz-sub{font-family:var(--main-font);font-size:12px;color:rgba(180,210,255,0.7);margin-top:3px;line-height:1.5;}
    .quiz-pt-badge{display:flex;flex-direction:column;align-items:center;background:rgba(255,220,60,0.1);border:1.5px solid rgba(255,220,60,0.3);border-radius:14px;padding:8px 12px;min-width:58px;flex-shrink:0;}
    .quiz-pt-num{font-family:var(--title-font);font-size:22px;color:#FFD700;line-height:1;}
    .quiz-pt-unit{font-family:var(--main-font);font-size:10px;color:rgba(255,210,80,0.7);margin-top:2px;}


    /* 링크 입력칸 */
    .quiz-link-section{padding:4px 18px 18px;}
    .link-label{font-family:var(--main-font);font-size:11px;color:rgba(160,190,255,0.6);margin-bottom:5px;margin-top:8px;display:block;}
    .link-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(100,140,255,0.22);border-radius:10px;padding:9px 12px;font-family:var(--main-font);font-size:12px;color:rgba(200,220,255,0.85);outline:none;display:block;}
    .link-input::placeholder{color:rgba(150,180,255,0.32);}
    .link-input:focus{border-color:rgba(100,160,255,0.5);background:rgba(255,255,255,0.08);}

    /* ═══ 챌린지 카드 ═══ */
    .card-challenge{width:100%;border-radius:22px;border:2px solid rgba(120,230,160,0.3);background:linear-gradient(135deg,rgba(10,50,30,0.92) 0%,rgba(5,35,20,0.97) 100%);box-shadow:0 0 32px rgba(30,200,100,0.12),inset 0 1px 0 rgba(255,255,255,0.06);overflow:hidden;}

    .ch-illust{position:relative;width:100%;height:180px;overflow:hidden;background:linear-gradient(160deg,#051A0E 0%,#0A2E18 55%,#0F3E22 100%);}
    .csp{position:absolute;border-radius:50%;animation:cSpk 2.2s ease-in-out infinite;}
    @keyframes cSpk{0%,100%{opacity:0.15;transform:scale(0.7);}50%{opacity:0.9;transform:scale(1.4);}}
    .csp1{width:10px;height:10px;background:#4AE090;top:12px;left:55px;animation-delay:0.1s;}
    .csp2{width:7px;height:7px;background:#FFD060;top:38px;left:18px;animation-delay:0.9s;}
    .csp3{width:8px;height:8px;background:#FF9060;bottom:22px;left:95px;animation-delay:0.4s;}
    .csp4{width:6px;height:6px;background:#90E0FF;top:20px;right:18px;animation-delay:1.3s;}
    .csp5{width:9px;height:9px;background:#FFB0E0;bottom:30px;right:50px;animation-delay:0.6s;}
    .csp6{width:5px;height:5px;background:#FFE040;top:55%;left:50%;animation-delay:1.8s;}
    .note{position:absolute;font-size:22px;animation:floatNote 2.5s ease-in-out infinite;opacity:0.7;}
    @keyframes floatNote{0%,100%{transform:translateY(0) rotate(-8deg);}50%{transform:translateY(-10px) rotate(8deg);}}
    .note1{top:10px;left:18px;color:#7AFFC0;animation-delay:0s;}
    .note2{top:8px;right:60px;font-size:16px;color:#90E0FF;animation-delay:0.8s;}
    .note3{bottom:25px;left:38%;font-size:14px;color:#FFD080;animation-delay:1.5s;}
    .ch-chars{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:flex-end;justify-content:center;padding:0 6px;gap:2px;}

    .ch-info{padding:12px 18px 6px;display:flex;align-items:center;justify-content:space-between;}
    .card-tag-ch{display:inline-block;background:rgba(40,220,120,0.14);border:1px solid rgba(40,220,120,0.3);color:#5AE0A0;font-size:11px;padding:3px 10px;border-radius:100px;margin-bottom:6px;}
    .ch-title{font-family:var(--title-font);font-size:clamp(17px,4.5vw,20px);color:#fff;line-height:1.2;}
    .ch-sub{font-family:var(--main-font);font-size:12px;color:rgba(160,240,200,0.7);margin-top:3px;line-height:1.5;}
    .ch-pt-badge{display:flex;flex-direction:column;align-items:center;background:rgba(60,220,120,0.1);border:1.5px solid rgba(60,220,120,0.3);border-radius:14px;padding:8px 12px;min-width:58px;flex-shrink:0;}
    .ch-pt-num{font-family:var(--title-font);font-size:22px;color:#4AE090;line-height:1;}
    .ch-pt-unit{font-family:var(--main-font);font-size:10px;color:rgba(60,220,120,0.7);margin-top:2px;}

    /* 패들렛 버튼 */
    .padlet-wrap{padding:4px 18px 18px;}
    .padlet-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 16px;background:linear-gradient(135deg,rgba(40,200,120,0.18),rgba(20,160,90,0.25));border:1.5px solid rgba(60,220,130,0.4);border-radius:14px;text-decoration:none;cursor:pointer;transition:transform 0.15s;animation:padletPulse 2s ease-in-out infinite;}
    @keyframes padletPulse{0%,100%{box-shadow:0 0 0 0 rgba(60,220,120,0.2);}50%{box-shadow:0 0 0 8px rgba(60,220,120,0);}}
    .padlet-btn:active{transform:scale(0.96);}
    .padlet-icon-wrap{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#FF6B9D,#FF9A3C);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .padlet-text-wrap{display:flex;flex-direction:column;align-items:flex-start;}
    .padlet-label{font-family:var(--title-font);font-size:15px;color:#5AE0A0;}
    .padlet-desc{font-family:var(--main-font);font-size:11px;color:rgba(140,220,180,0.7);}
    .padlet-arrow{font-size:18px;color:rgba(80,220,140,0.6);margin-left:auto;}

    /* ── 우주인 ── */
    .divider{margin-top:2.5vh;width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);}
    .tired-section{margin-top:2.5vh;width:100%;display:flex;flex-direction:column;align-items:center;animation:fadeUp 0.5s ease 0.3s both;}
    .tired-bubble{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:14px 20px;text-align:center;position:relative;margin-bottom:10px;}
    .tired-bubble::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top:10px solid rgba(255,255,255,0.12);}
    .tired-text{font-family:var(--main-font);font-size:14px;color:rgba(220,230,255,0.9);line-height:1.8;}
    .tired-text .t-em{color:#A8D8FF;font-weight:bold;}
    .lottie-wrap{width:260px;height:260px;display:flex;align-items:center;justify-content:center;}
    .next-arrow-wrap{margin-top:0.5vh;display:flex;flex-direction:column;align-items:center;gap:8px;}
    .next-arrow-btn{display:flex;align-items:center;gap:6px;background:rgba(100,140,255,0.18);border:1.5px solid rgba(100,140,255,0.35);border-radius:100px;padding:10px 22px;font-family:var(--main-font);font-size:14px;color:#B0D0FF;cursor:pointer;transition:transform 0.15s;animation:arrowPulse 1.8s ease-in-out infinite;}
    @keyframes arrowPulse{0%,100%{box-shadow:0 0 0 0 rgba(100,140,255,0.3);}50%{box-shadow:0 0 0 8px rgba(100,140,255,0);}}
    .next-arrow-btn:active{transform:scale(0.95);}
    .arrow-icon{font-size:18px;animation:bounce 1.2s ease-in-out infinite;display:inline-block;}
    @keyframes bounce{0%,100%{transform:translateX(0);}50%{transform:translateX(5px);}}

    .nav-bar{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;justify-content:center;gap:12px;padding:12px 20px 20px;background:linear-gradient(to top,rgba(4,6,26,0.97) 60%,transparent);}
    .nav-btn{flex:1;max-width:160px;display:flex;align-items:center;justify-content:center;gap:5px;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.18);border-radius:100px;padding:11px 0;font-family:var(--main-font);font-size:14px;color:#fff;cursor:pointer;transition:transform 0.15s;}
    .nav-btn:active{transform:scale(0.95);}
    .nav-btn.prev{background:rgba(255,255,255,0.08);}
    .nav-btn.next{background:rgba(80,120,220,0.35);border-color:rgba(100,150,255,0.4);}

    /* ── 오늘의 체크인 카드 ── */
    .card-checkin{
      width:100%;border-radius:26px;
      border:2px solid rgba(60,120,255,0.45);
      background:linear-gradient(135deg,rgba(5,10,50,0.92) 0%,rgba(5,8,35,0.97) 100%);
      box-shadow:0 0 40px rgba(60,120,255,0.14),inset 0 1px 0 rgba(255,255,255,0.06);
      overflow:hidden;position:relative;
      cursor:pointer;transition:transform 0.18s;
      text-decoration:none;display:block;
      margin-top:2.5vh;
    }
    .card-checkin:active{transform:scale(0.97);}
    .checkin-illust{
      position:relative;width:100%;height:185px;overflow:hidden;
      background:linear-gradient(160deg,#050A2A 0%,#080F38 50%,#060C2E 100%);
    }
    .bsp{position:absolute;border-radius:50%;animation:bSpk 2.3s ease-in-out infinite;}
    @keyframes bSpk{0%,100%{opacity:0.2;transform:scale(0.7);}50%{opacity:0.85;transform:scale(1.4);}}
    .bs1{width:8px;height:8px;background:#60A0FF;top:16px;left:50px;animation-delay:0.2s;}
    .bs2{width:5px;height:5px;background:#90D0FF;top:28px;right:44px;animation-delay:0.9s;}
    .bs3{width:6px;height:6px;background:#A0C0FF;bottom:44px;left:80px;animation-delay:0.5s;}
    .bs4{width:4px;height:4px;background:#C0E0FF;top:12px;right:100px;animation-delay:1.4s;}
    .bs5{width:7px;height:7px;background:#80B0FF;bottom:30px;right:60px;animation-delay:0.3s;}
    .checkin-card-body{padding:14px 20px 18px;display:flex;align-items:center;justify-content:space-between;}
    .checkin-title{font-family:var(--title-font);font-size:clamp(18px,5vw,22px);color:#fff;line-height:1.2;}
    .checkin-sub{font-family:var(--main-font);font-size:12px;color:rgba(160,200,255,0.7);margin-top:4px;line-height:1.6;}
    .blue-arrow{font-size:22px;color:rgba(100,160,255,0.6);}
    .ci-month-btn{font-family:var(--main-font);font-size:12px;padding:5px 10px;border-radius:100px;border:1px solid rgba(60,120,255,0.3);background:rgba(60,120,255,0.08);color:rgba(160,200,255,0.7);cursor:pointer;transition:all 0.15s;}
    .ci-month-btn.active{background:rgba(60,120,255,0.35);border-color:rgba(80,150,255,0.6);color:#fff;}
    #checkin-modal.open{display:flex!important;}

    /* ── 응원 섹션 ── */
    .cheer-section{margin-top:4vh;width:100%;display:flex;flex-direction:column;align-items:center;animation:fadeUp 0.5s ease 0.25s both;}
    .cheer-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);margin-bottom:3vh;}
    .cheer-bubble{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:22px 26px;text-align:center;width:100%;position:relative;}
    .cheer-q{font-family:var(--main-font);font-size:15px;color:rgba(220,230,255,0.9);line-height:2;}
    .cheer-q .hl-yellow{font-family:var(--title-font);font-size:clamp(18px,5vw,22px);color:#FFD700;text-shadow:0 0 12px rgba(255,200,0,0.4);animation:cheerShimmer 2s ease-in-out infinite;}
    @keyframes cheerShimmer{0%,100%{text-shadow:0 0 12px rgba(255,200,0,0.4);}50%{text-shadow:0 0 24px rgba(255,200,0,0.8);}}
    .cheer-chars{display:flex;align-items:flex-end;justify-content:center;gap:16px;margin-top:18px;}
    .cheer-char{animation:cheerJump 1.2s ease-in-out infinite;}
    .cheer-char:nth-child(2){animation-delay:0.2s;}
    .cheer-char:nth-child(3){animation-delay:0.4s;}
    @keyframes cheerJump{0%,100%{transform:translateY(0);}45%{transform:translateY(-14px);}55%{transform:translateY(-14px);}}
    .confetti-wrap{position:relative;width:100%;height:50px;overflow:hidden;margin-top:10px;}
    @keyframes confFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(60px) rotate(360deg);opacity:0;}}
    .page-out{animation:pageOut 0.4s ease forwards!important;}
    @keyframes pageOut{to{opacity:0;transform:translateY(-14px);}}
  </style>
</head>
<body>
<div class="scene">
  <canvas id="star-canvas"></canvas>
  <div class="shoot sh1"></div>
  <div class="shoot sh2"></div>

  <div class="content">

    <div class="step-title-wrap">
      <div style="text-align:center;margin-bottom:10px;">
        <span style="display:inline-block;font-family:var(--main-font);font-size:13px;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.3);padding:5px 22px;border-radius:100px;letter-spacing:3px;">Step 5</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
        <span style="font-size:38px;animation:treasureBounce 2s ease-in-out infinite;display:inline-block;">📺</span>
        <div class="step-main-title">탐험 성공!<br>이제는 신나는 휴식 시간</div>
        <span style="font-size:38px;animation:treasureBounce 2s ease-in-out infinite 0.4s;display:inline-block;">📺</span>
      </div>
    </div>

    <div class="card-wrap">

      <!-- ① 팝콘 건강 TV 카드 -->
      <div class="card-quiz">
                <div class="quiz-illust" style="display:flex;align-items:center;justify-content:center;">
          <div id="tv-popcorn-illust" style="width:150px;height:150px;">
<style>
@keyframes tvScreen{0%,100%{opacity:1;}8%{opacity:.7;}10%{opacity:1;}}
@keyframes antWiggle{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}
@keyframes pcFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
@keyframes pop1{0%,100%{transform:translate(0,0) scale(1);}45%{transform:translate(-4px,-13px) scale(1.18);}}
@keyframes pop2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(5px,-16px) scale(1.22);}}
@keyframes pop3{0%,100%{transform:translate(0,0) scale(1);}40%{transform:translate(-2px,-10px) scale(1.12);}}
@keyframes pop4{0%,100%{transform:translate(0,0) scale(1);}55%{transform:translate(3px,-11px) scale(1.1);}}
@keyframes note1{0%{opacity:0;transform:translate(0,0);}30%{opacity:1;}100%{opacity:0;transform:translate(12px,-22px);}}
@keyframes note2{0%{opacity:0;transform:translate(0,0);}20%{opacity:1;}100%{opacity:0;transform:translate(-10px,-18px);}}
@keyframes twinkle{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}
.tv-ant-l{transform-origin:32px 34px;animation:antWiggle 2.4s ease-in-out infinite;}
.tv-ant-r{transform-origin:54px 34px;animation:antWiggle 2.4s ease-in-out .3s infinite;}
.tv-screen{animation:tvScreen 4s ease-in-out infinite;}
.pc-wrap{animation:pcFloat 2.2s ease-in-out infinite;}
.tp1{animation:pop1 1.3s ease-in-out infinite;}
.tp2{animation:pop2 1.6s ease-in-out .15s infinite;}
.tp3{animation:pop3 1.1s ease-in-out .4s infinite;}
.tp4{animation:pop4 1.45s ease-in-out .25s infinite;}
.tnote-a{animation:note1 2s ease-out .5s infinite;}
.tnote-b{animation:note2 2.3s ease-out 1.1s infinite;}
.ttw1{animation:twinkle 1.8s ease-in-out infinite;}
.ttw2{animation:twinkle 2.1s ease-in-out .6s infinite;}
</style>
<svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg" width="150" height="150">
  <defs>
    <linearGradient id="tsg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>

(function(){
  var c=document.getElementById('star-canvas'),ctx=c.getContext('2d');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;draw();}
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(var i=0;i<180;i++){
      var x=Math.random()*c.width,y=Math.random()*c.height;
      var r=Math.random()*1.5+0.2,a=Math.random()*0.75+0.2;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+a+')';ctx.fill();
    }
  }
  window.addEventListener('resize',resize);resize();
})();


/* ── 색종이 ── */
(function(){

/* ── 로티 우주인 ── */
(function(){
  var wrap=document.getElementById('lottie-astronaut'), loaded=false;
  var URLS = [
    'https://lottie.host/65ec44b0-ed3c-41ba-9d4d-8f2b4788ec98/animation.json',
    'https://lottie.host/1bbc5604-79be-4d02-b7ea-6f34d3d2c441/animation.json'
  ];
  var idx = 0;
  function tryNext(){
    if(idx >= URLS.length){ fb(); return; }
    var url = URLS[idx++];
    wrap.innerHTML = '';
    var anim = lottie.loadAnimation({container:wrap,renderer:'svg',loop:true,autoplay:true,path:url});
    anim.addEventListener('data_ready',function(){ loaded=true; });
    anim.addEventListener('data_failed',function(){ tryNext(); });
  }
  tryNext();
  setTimeout(function(){ if(!loaded){ wrap.innerHTML=''; fb(); } }, 5000);
  function fb(){
    wrap.innerHTML = '<div style="font-size:120px;text-align:center;line-height:260px;animation:floatA 2.5s ease-in-out infinite;">🧑‍🚀</div>';
  }
  var s=document.createElement('style');
  s.textContent='@keyframes floatA{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-18px) rotate(4deg);}}';
  document.head.appendChild(s);
})();

/* ── 토스트 ── */
function showToast(msg){
  var t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(20,30,70,0.96);border:1px solid rgba(100,140,255,0.4);border-radius:100px;padding:10px 22px;font-family:var(--main-font);font-size:14px;color:#C8D8FF;z-index:200;display:none;white-space:nowrap;';document.body.appendChild(t);}
  t.textContent=msg;t.style.display='block';
  setTimeout(function(){t.style.display='none';},2200);
}


/* ── 체크인 모달 ── */
var CI_STORAGE='tuntun_body_records_v2';
var ciMonth=6;
var SCRIPT_URL=localStorage.getItem('ci_script_url')||'';

function loadCiRecords(){try{var r=localStorage.getItem(CI_STORAGE);return r?JSON.parse(r):{};} catch(e){return {};}}
function saveCiRecords(r){try{localStorage.setItem(CI_STORAGE,JSON.stringify(r));}catch(e){}}

function getBmiStatus(bmi){
  if(bmi<18.5) return{label:'저체중',color:'#378ADD',bg:'#E6F1FB',desc:'몸무게가 조금 부족해요. 균형 잡힌 식사로 건강하게 몸을 키워봐요!'};
  if(bmi<23)   return{label:'정상',color:'#1D9E75',bg:'#E1F5EE',desc:'아주 건강한 상태예요! 지금처럼 건강한 생활을 유지해요!'};
  if(bmi<25)   return{label:'과체중(비만 전단계)',color:'#EF9F27',bg:'#FAEEDA',desc:'비만 전단계예요. 규칙적인 운동과 균형 잡힌 식사를 시작해봐요!'};
  if(bmi<30)   return{label:'1단계 비만',color:'#D85A30',bg:'#FAECE7',desc:'1단계 비만이에요. 건강한 식습관과 운동이 꼭 필요해요!'};
  if(bmi<35)   return{label:'2단계 비만',color:'#E24B4A',bg:'#FCEBEB',desc:'2단계 비만이에요. 선생님과 함께 건강 계획을 세워봐요!'};
  return          {label:'3단계 비만(고도비만)',color:'#A32D2D',bg:'#FCEBEB',desc:'고도비만이에요. 전문가의 도움이 필요해요. 선생님께 말씀드려요!'};
}

function openCheckin(){
  document.getElementById('checkin-modal').classList.add('open');
  ciMonth=new Date().getMonth()+1;
  if(ciMonth<6) ciMonth=6; if(ciMonth>12) ciMonth=12;
  document.querySelectorAll('.ci-month-btn').forEach(function(b){b.classList.toggle('active',b.textContent===ciMonth+'월');});
  var recs=loadCiRecords();
  if(recs[ciMonth]){
    document.getElementById('ci-height').value=recs[ciMonth].h;
    document.getElementById('ci-weight').value=recs[ciMonth].w;
    ciShowResult(recs[ciMonth].bmi);
  } else {
    document.getElementById('ci-height').value='';
    document.getElementById('ci-weight').value='';
    document.getElementById('ci-result').style.display='none';
  }
  ciRenderHistory(recs);
}
function closeCheckin(){document.getElementById('checkin-modal').classList.remove('open');}

function ciSelectMonth(m,el){
  ciMonth=m;
  document.querySelectorAll('.ci-month-btn').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  var recs=loadCiRecords();
  if(recs[m]){document.getElementById('ci-height').value=recs[m].h;document.getElementById('ci-weight').value=recs[m].w;ciShowResult(recs[m].bmi);}
  else{document.getElementById('ci-height').value='';document.getElementById('ci-weight').value='';document.getElementById('ci-result').style.display='none';}
}

function ciShowResult(bmi){
  var st=getBmiStatus(bmi);
  var rc=document.getElementById('ci-result');
  rc.style.display='block';rc.style.background=st.bg;
  document.getElementById('ci-bmi-val').textContent='BMI '+bmi.toFixed(1);
  document.getElementById('ci-bmi-val').style.color=st.color;
  document.getElementById('ci-bmi-label').textContent=st.label;
  document.getElementById('ci-bmi-label').style.color=st.color;
  document.getElementById('ci-bmi-desc').textContent=st.desc;
}

function ciCalcBMI(){
  var h=parseFloat(document.getElementById('ci-height').value);
  var w=parseFloat(document.getElementById('ci-weight').value);
  var num=document.getElementById('ci-number').value.trim();
  var name=document.getElementById('ci-name').value.trim();
  if(!h||!w||h<80||h>220||w<10||w>200){showToast('키와 몸무게를 올바르게 입력해 주세요!');return;}
  var bmi=w/((h/100)*(h/100));
  var recs=loadCiRecords();
  recs[ciMonth]={h:h,w:w,bmi:bmi,number:num,name:name};
  saveCiRecords(recs);
  ciShowResult(bmi);
  ciRenderHistory(recs);
  showToast(ciMonth+'월 기록 저장 완료! 🔒');
}

function ciRenderHistory(recs){
  var keys=Object.keys(recs).map(Number).sort(function(a,b){return a-b;});
  var wrap=document.getElementById('ci-history');
  if(keys.length===0){wrap.style.display='none';return;}
  wrap.style.display='block';
  var html='';
  keys.forEach(function(m,idx){
    var r=recs[m],st=getBmiStatus(r.bmi),trend='';
    if(idx>0){var d=r.bmi-recs[keys[idx-1]].bmi;trend=d>0.2?'<span style="color:#E24B4A">↑</span>':d<-0.2?'<span style="color:#1D9E75">↓</span>':'<span style="color:#aaa">→</span>';}
    html+='<div style="display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.05);border-radius:10px;padding:8px 12px;gap:6px;">'+
      '<span style="font-family:var(--main-font);font-size:12px;color:rgba(200,220,255,0.7);min-width:30px;">'+m+'월</span>'+
      '<span style="font-family:var(--main-font);font-size:11px;color:rgba(180,200,255,0.6);flex:1;">'+r.h+'cm·'+r.w+'kg</span>'+
      '<span style="font-family:var(--main-font);font-size:13px;font-weight:bold;color:'+st.color+'">'+r.bmi.toFixed(1)+trend+'</span>'+
      '<span style="font-family:var(--main-font);font-size:10px;padding:2px 8px;border-radius:100px;background:'+st.bg+';color:'+st.color+'">'+st.label+'</span>'+
    '</div>';
  });
  document.getElementById('ci-history-list').innerHTML=html;
}
